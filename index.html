                        </div>
                        {bc&&(<div style={{ marginLeft:"auto", display:"flex", gap:14, alignItems:"center" }}>
                          <span style={{ fontFamily:C.num, fontSize:13, fontWeight:700, color:pColor(bc.profitRate) }}>{bc.profitJPY>=0?"+":""}{yen(bc.profitJPY)}</span>
                          <span style={{ fontFamily:C.num, fontSize:12, fontWeight:700, color:pColor(bc.profitRate), background:`${pColor(bc.profitRate)}15`, padding:"2px 8px", borderRadius:5 }}>{pct(bc.profitRate)}</span>
                        </div>)}
                      </div>
                    </td>
                  </tr>,
                  <TR key={g.leader.id} item={g.leader} bundleCalc={bc} indent isLastInBundle={g.members.length===0}/>,
                  ...g.members.map((m,mi)=><TR key={m.id} item={m} bundleCalc={null} indent isLastInBundle={mi===g.members.length-1}/>)
                ];
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// Desktop App Layout
// ═══════════════════════════════════════════════════════════════
function DesktopApp({ items, onSave, onDelete, onReturn, onReturnConfirm, onRelist, onCreateBundle, onBundleSaveEdit, onSplit, onImport, onExport, returnItem, setReturnItem, splitItem, setSplitItem, onSplitConfirm, settings, onSettingsChange }) {
  const [selectedId, setSelectedId] = useState(null);
  const [selectedBundleGroupId, setSelectedBundleGroupId] = useState(null);
  const [formKey, setFormKey]       = useState(0);
  const [panelW, setPanelW]         = useState(480);
  const [dragging, setDragging]     = useState(false);
  const [saved, setSaved]           = useState(false);
  const [showLeft, setShowLeft]     = useState(true);

  const selectedItem = selectedId ? items.find(i=>i.id===selectedId) : null;

  // Bundle editing
  const bundleGroupItems = selectedBundleGroupId ? items.filter(i=>i.bundleGroupId===selectedBundleGroupId) : [];
  const bundleLeader = bundleGroupItems.find(i=>i.isBundleLeader) || bundleGroupItems[0];
  const bundleMembers = bundleGroupItems.filter(i=>i!==bundleLeader);

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX, startW = panelW;
    const onMove = (ev) => setPanelW(Math.max(380, Math.min(800, startW + (startX - ev.clientX))));
    const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); setDragging(false); };
    setDragging(true);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  const handleSaveAndReset = (form) => {
    onSave(form);
    if (!form.id) { setSelectedId(null); setSelectedBundleGroupId(null); setFormKey(k => k + 1); setSaved(true); }
  };
  const openNewForm = () => { setSelectedId(null); setSelectedBundleGroupId(null); setFormKey(k=>k+1); setSaved(false); };
  const openEdit = (item) => { setSelectedId(item.id); setSelectedBundleGroupId(null); setSaved(false); };
  const openBundleEdit = (groupId) => { setSelectedBundleGroupId(groupId); setSelectedId(null); setSaved(false); };

  // まとめ売り作成 → 即バンドル化＋右パネルで編集
  const handleBundleSale = (selectedItems) => {
    const gid = genId();
    onCreateBundle(gid, selectedItems);
    setSelectedBundleGroupId(gid);
    setSelectedId(null);
    setSaved(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" }}>
      {/* Header */}
      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 24px", display:"flex", alignItems:"center", gap:12, height:50, flexShrink:0, boxShadow:C.shadow }}>
        <Calculator size={16} color={C.accent}/>
        <span style={{ fontFamily:C.jp, fontWeight:700, fontSize:15, color:C.text }}>eBay 利益計算</span>
        <span style={{ color:C.muted, fontSize:11, fontFamily:C.num, background:C.bg, padding:"2px 7px", borderRadius:5, border:`1px solid ${C.border}` }}>v3</span>

        {/* 左パネル開閉ボタン */}
        <button onClick={()=>setShowLeft(v=>!v)} title={showLeft?"テーブルを閉じる":"テーブルを開く"}
          style={{ ...btnS("secondary",{ padding:"4px 10px", fontSize:11 }), marginLeft:8 }}>
          <PanelLeft size={14}/> {showLeft?"テーブルを閉じる":"テーブルを開く"}
        </button>

        <div style={{ marginLeft:"auto", display:"flex", gap:8 }}>
          <label style={btnS("secondary",{fontSize:12,cursor:"pointer",padding:"5px 14px"})}>📥 取込<input type="file" accept=".json" onChange={onImport} style={{display:"none"}}/></label>
          {items.length>0&&<button onClick={onExport} style={btnS("secondary",{fontSize:12,padding:"5px 14px"})}>📤 出力</button>}
          <button onClick={openNewForm} style={btnS("primary",{fontSize:13,padding:"5px 16px"})}><Plus size={13}/> 新規追加</button>
        </div>
      </div>

      {/* Panels */}
      <div style={{ display:"flex", flex:1, minHeight:0 }}>
        {/* Left: table */}
        {showLeft && (
          <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", background:C.surface, overflow:"hidden" }}>
            <DesktopTable items={items} selectedId={selectedId} selectedBundleId={selectedBundleGroupId} onRowClick={openEdit} onBundleHeaderClick={openBundleEdit} onDelete={onDelete} onReturn={onReturn} onRelist={onRelist} onBundleSale={handleBundleSale} onSplit={onSplit}/>
          </div>
        )}
        {/* Drag handle */}
        {showLeft && (
          <div onMouseDown={startDrag}
            style={{ width:5, cursor:"col-resize", background:dragging?C.accent:C.border, flexShrink:0, transition:"background .15s" }}
            onMouseEnter={e=>{if(!dragging)e.currentTarget.style.background=C.accent;}}
            onMouseLeave={e=>{if(!dragging)e.currentTarget.style.background=C.border;}}
          />
        )}
        {/* Right: form */}
        <div style={{ width: showLeft ? panelW : "100%", flexShrink: showLeft ? 0 : undefined, flex: showLeft ? undefined : 1, background:C.bg, overflowY:"auto" }}>
          <div style={{ padding:"16px 18px", maxWidth: showLeft ? undefined : 700, margin: showLeft ? undefined : "0 auto" }}>
            <MiniCalc settings={settings} onSettingsChange={onSettingsChange} />
            {selectedBundleGroupId && bundleLeader ? (
              <>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                  <span style={{ fontFamily:C.jp, fontWeight:700, fontSize:14, color:C.accent }}>
                    📦 まとめ売り編集
                  </span>
                  <button onClick={openNewForm} style={btnS("secondary",{fontSize:11,padding:"3px 10px"})}><Plus size={11}/> 新規</button>
                </div>
                <BundleEditForm
                  key={selectedBundleGroupId}
                  leader={bundleLeader}
                  members={bundleMembers}
                  onSave={(data) => { onBundleSaveEdit(selectedBundleGroupId, data); }}
                  onCancel={()=>setSelectedBundleGroupId(null)}
                  settings={settings}
                />
              </>
            ) : saved && !selectedItem ? (
              <div style={{ textAlign:"center", padding:"60px 20px" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>✅</div>
                <div style={{ fontFamily:C.jp, fontSize:16, fontWeight:700, color:C.text, marginBottom:8 }}>追加しました</div>
                <div style={{ fontFamily:C.jp, fontSize:13, color:C.muted, marginBottom:24 }}>続けて追加する場合は「新規追加」を押してください</div>
                <button onClick={openNewForm} style={btnS("primary",{fontSize:14,padding:"10px 24px"})}><Plus size={14}/> 新規追加</button>
              </div>
            ) : (
              <>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                  <span style={{ fontFamily:C.jp, fontWeight:700, fontSize:14, color:C.text }}>
                    {selectedItem?`✏️ 編集中 #${selectedItem.managementNumber}`:"➕ 新規追加"}
                  </span>
                  {selectedItem&&<button onClick={openNewForm} style={btnS("secondary",{fontSize:11,padding:"3px 10px"})}><Plus size={11}/> 新規</button>}
                </div>
                <ItemForm
                  key={selectedId ?? `new-${formKey}`}
                  initial={selectedItem??{}}
                  onSave={handleSaveAndReset}
                  onCancel={()=>setSelectedId(null)}
                  allItems={items}
                  settings={settings}
                />
              </>
            )}
          </div>
        </div>
      </div>

      {returnItem  && <ReturnModal item={returnItem} onConfirm={onReturnConfirm} onClose={()=>setReturnItem(null)}/>}
      {splitItem   && <SplitModal item={splitItem} onConfirm={onSplitConfirm} onClose={()=>setSplitItem(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [items,       setItems]       = useState([]);
  const [loaded,      setLoaded]      = useState(false);
  const [settings,    setSettings]    = useState(DEFAULT_SETTINGS);
  const [returnItem,  setReturnItem]  = useState(null);
  const [splitItem,   setSplitItem]   = useState(null);

  useEffect(() => {
    (async()=>{
      try { const r=await window.storage.get("ebay_v3_settings"); if(r?.value) setSettings(prev=>({...DEFAULT_SETTINGS,...JSON.parse(r.value)})); } catch(_){}
      try {
        const r=await window.storage.get("ebay_v2_items");
        if(r?.value) {
          const loaded = JSON.parse(r.value);
          const corrected = loaded.map(i => {
            const hasSaleDate = !!(i.saleDate && i.saleDate !== "" && !i.saleDate.startsWith("1900"));
            // 落札日あり → sold、なし → 既存statusを優先しつつ"sold"なら"unsold"に補正
            if (hasSaleDate && i.status !== "returned") return { ...i, status: "sold" };
            if (!hasSaleDate && i.status === "sold") return { ...i, status: "unsold" };
            return i;
          });
          setItems(corrected);
        }
      } catch(_){}
      setLoaded(true);
    })();
  },[]);
  useEffect(() => { if(!loaded) return; window.storage.set("ebay_v2_items", JSON.stringify(items)).catch(()=>{}); },[items,loaded]);
  useEffect(() => { if(!loaded) return; window.storage.set("ebay_v3_settings", JSON.stringify(settings)).catch(()=>{}); },[settings,loaded]);

  const handleSave = (form) => {
    if (form.id) { setItems(p => p.map(i => i.id===form.id ? form : i)); }
    else { setItems(p => [{ ...form, id:genId(), managementNumber:nextNo(p) }, ...p]); }
  };
  const handleDelete       = (id)    => setItems(p => p.filter(i => i.id!==id));
  const handleReturnOpen   = (item)  => setReturnItem(item);
  const handleReturnConfirm = (form) => {
    setItems(p => p.map(i => i.id===returnItem.id ? { ...i, status:"returned", ...form } : i));
    setReturnItem(null);
  };
  const handleRelist = (item) => {
    setItems(p => [{ ...item, id:genId(), managementNumber:nextNo(p), cost:0, storageShipping:0, salePrice:"", saleDate:"", saleShipping:"", status:"unsold", returnDate:"", returnShipping:"", returnNotes:"", relistFromId:item.id, bundleGroupId:null, isBundleLeader:false }, ...p]);
  };
  const handleSplitConfirm = (parts) => {
    const orig = splitItem;
    const newItems = parts.map((p, i) => ({
      ...orig, id: genId(),
      managementNumber: i === 0 ? orig.managementNumber : nextNo([...items, ...parts.slice(0,i).map((_,j)=>({managementNumber:String(+orig.managementNumber+j+1)}))]),
      productName: p.name, cost: +p.cost || 0,
      storageShipping: i === 0 ? orig.storageShipping : 0,
      notes: `${orig.productName}より分割`, splitFromId: orig.id,
    }));
    setItems(p => [...newItems, ...p.filter(i => i.id !== orig.id)]);
    setSplitItem(null);
  };
  const handleCreateBundle = (gid, selectedItems) => {
    const combinedName = selectedItems.map(i=>i.productName||"—").join(" + ");
    setItems(p => p.map(i => {
      const sel = selectedItems.find(s=>s.id===i.id);
      if (!sel) return i;
      const isLeader = sel.id===selectedItems[0].id;
      if (isLeader) {
        return { ...i, bundleGroupId:gid, isBundleLeader:true, category:"bundle",
                 productName: combinedName, salePrice:"", saleShipping:"", status:"unsold" };
      } else {
        return { ...i, bundleGroupId:gid, isBundleLeader:false,
                 salePrice:"", saleShipping:"" };
      }
    }));
  };
  const handleBundleSaveEdit = (groupId, { leaderData, memberCosts }) => {
    setItems(p => p.map(i => {
      if (i.bundleGroupId !== groupId) return i;
      const mc = memberCosts.find(c => c.id === i.id);
      if (i.isBundleLeader) {
        // リーダーに売上情報 + 原価を保存
        return { ...i, ...leaderData, ...(mc ? { cost: mc.cost, storageShipping: mc.storageShipping } : {}) };
      } else {
        // メンバーの原価・転送送料を更新、ステータスと落札日を同期
        return { ...i, ...(mc ? { cost: mc.cost, storageShipping: mc.storageShipping } : {}), status: leaderData.status || i.status, saleDate: leaderData.saleDate || i.saleDate };
      }
    }));
  };
  const handleImport = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=(ev)=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(!Array.isArray(d)){alert("形式が正しくありません");return;}
        setItems(d.map(i=>{
          const hasSaleDate = !!(i.saleDate && i.saleDate !== "" && !i.saleDate.startsWith("1900"));
          let status = i.status || "unsold";
          if (hasSaleDate && status !== "returned") status = "sold";
          if (!hasSaleDate && status === "sold") status = "unsold";
          return { ...i, id: i.id||genId(), status };
        }));
        alert(`✅ ${d.length}件を取り込みました`);
      } catch(e) { alert("読み込み失敗"); }
    };
    r.readAsText(file); e.target.value="";
  };
  const handleExport = () => {
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(items,null,2)],{type:"application/json"}));
    a.download=`ebay_data_${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  const globalStyle = `
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    input:focus, select:focus { border-color:#4f52b5 !important; box-shadow:0 0 0 3px rgba(79,82,181,.18) !important; outline:none !important; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#b0b4d0; border-radius:4px; }
    button:hover { opacity:.85; }
    a { color:inherit; }
  `;

  if (!loaded) return <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:C.bg, fontFamily:C.jp, color:C.muted }}>読み込み中...</div>;

  return (
    <div style={{ fontFamily:C.jp, background:C.bg }}>
      <style>{globalStyle}</style>
      <DesktopApp
        items={items} onSave={handleSave} onDelete={handleDelete}
        onReturn={handleReturnOpen} onReturnConfirm={handleReturnConfirm}
        onRelist={handleRelist}
        onCreateBundle={handleCreateBundle} onBundleSaveEdit={handleBundleSaveEdit}
        onSplit={setSplitItem} onSplitConfirm={handleSplitConfirm}
        onImport={handleImport} onExport={handleExport}
        returnItem={returnItem}   setReturnItem={setReturnItem}
        splitItem={splitItem}     setSplitItem={setSplitItem}
        settings={settings}       onSettingsChange={setSettings}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
      const canvas = document.createElement("canvas");
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.72));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

// ── Calculation ───────────────────────────────────────────────
function quickCalc(usd_, { exchangeRate=158, ebayPct=12, promoPct=2, shippingJPY=6000, targetPct=15 } = {}) {
  const s = usd_ * exchangeRate;
  const ebayFeeJPY = s * (ebayPct / 100);
  const promoFeeJPY = s * (promoPct / 100);
  return {
    salesJPY: s, ebayFeeJPY, promoFeeJPY,
    targetProfJPY: s * (targetPct / 100),
    shippingJPY,
    maxBuyJPY: s * (1 - (ebayPct + promoPct) / 100 - targetPct / 100) - shippingJPY,
  };
}

function calcFull(item, overrideCost = null) {
  const { salePrice=0, saleShipping=0, ddpSurcharge=0, exchangeRate=158,
          ebayFeeRate=12, promotionRate=2, cost=0, storageShipping=0, intlShipping=6000,
          actualDdpFee="", actualEbayFeeUSD="", actualPromoFeeUSD="",
          refundUSD="", refundExchangeRate="", refundType="none",
          destination="other" } = item;
  if (!+salePrice) return null;
  const totalUSD  = +salePrice + +saleShipping + +ddpSurcharge;
  const totalJPY  = totalUSD * +exchangeRate;
  const ebayBase  = +actualEbayFeeUSD  ? +actualEbayFeeUSD  * +exchangeRate : totalJPY * (+ebayFeeRate / 100);
  const promoFee  = +actualPromoFeeUSD ? +actualPromoFeeUSD * +exchangeRate : totalJPY * (+promotionRate / 100);
  const totalFee  = ebayBase + promoFee;
  const usedCost  = overrideCost ?? (+cost + +storageShipping);
  const ddpCostJPY = +actualDdpFee ? +actualDdpFee : (destination === "us" ? +ddpSurcharge * +exchangeRate : 0);
  const isActualDdp = !!+actualDdpFee;
  const refundJPY = refundType !== "none" && +refundUSD ? +refundUSD * (+refundExchangeRate || +exchangeRate) : 0;
  const profitJPY = totalJPY - totalFee - usedCost - +intlShipping - ddpCostJPY - refundJPY;
  const isActual  = !!(+actualEbayFeeUSD || +actualPromoFeeUSD);
  return { totalUSD, totalJPY, ebayBase, promoFee, totalFee, usedCost, profitJPY, profitRate: profitJPY / totalJPY, isActual, isActualDdp, ddpCostJPY, refundJPY };
}

function calcJunk(item) {
  const loss = (+item.cost || 0) + (+item.storageShipping || 0);
  return { profitJPY: -loss, profitRate: null, isJunkCalc: true };
}

function calcBundle(leader, members) {
  const totalCost = [...members, leader].reduce((s, i) => s + (+i.cost||0) + (+i.storageShipping||0), 0);
  return calcFull(leader, totalCost);
}

// ── PhotoLightbox ─────────────────────────────────────────────
function PhotoLightbox({ photos, startIndex=0, onClose }) {
  const [idx, setIdx] = useState(startIndex);
  const prev = () => setIdx(i => (i - 1 + photos.length) % photos.length);
  const next = () => setIdx(i => (i + 1) % photos.length);
  useEffect(() => {
    const handler = e => { if(e.key==="ArrowLeft") prev(); if(e.key==="ArrowRight") next(); if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.92)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
      <button onClick={e=>{e.stopPropagation();prev();}} style={{ position:"absolute", left:16, background:"rgba(255,255,255,.15)", border:"none", borderRadius:"50%", width:40, height:40, cursor:"pointer", color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
      <img src={photos[idx]} alt="" onClick={e=>e.stopPropagation()} style={{ maxWidth:"92vw", maxHeight:"88vh", borderRadius:10, objectFit:"contain", boxShadow:"0 8px 40px rgba(0,0,0,.6)" }} />
      <button onClick={e=>{e.stopPropagation();next();}} style={{ position:"absolute", right:16, background:"rgba(255,255,255,.15)", border:"none", borderRadius:"50%", width:40, height:40, cursor:"pointer", color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>

  );
}

  const offerC = showOffer && +offerPrice ? calcFull(offerCalcItem) : null;

  // Estimated fees for display
  const totalUSD = +form.salePrice + (+form.saleShipping||0) + (form.destination==="us" ? +autoDdp : 0);
  const estEbayUSD = totalUSD * (+form.ebayFeeRate || 12) / 100;
  const estPromoUSD = totalUSD * (+form.promotionRate || 2) / 100;

  const ProfitBar = ({ label, calc, highlight }) => (
    <div style={{ ...cardS({ marginBottom:8, padding:14 }), borderColor:`${pColor(calc.profitRate)}40`, background: highlight ? `${pColor(calc.profitRate)}08` : pBg(calc.profitRate) }}>
      {label && <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.muted, marginBottom:10, letterSpacing:"0.06em" }}>{label}</div>}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
        {[["決済合計",yen(calc.totalJPY),C.text],["最終利益",yen(calc.profitJPY),pColor(calc.profitRate)],["利益率",pct(calc.profitRate),pColor(calc.profitRate)]].map(([l,v,col],i)=>(
          <div key={i} style={{ textAlign:"center", padding:"4px", borderLeft:i>0?`1px solid ${C.border}`:"none" }}>
            <span style={lblS({ display:"block", marginBottom:4 })}>{l}</span>
            <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      {/* バンドルメンバー注意バナー */}
      {isBundleMember && (
        <div style={{ ...cardS({ marginBottom:14, padding:12 }), background:`${C.accent}10`, borderColor:`${C.accent}30` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <Link2 size={14} color={C.accent}/>
            <span style={{ fontFamily:C.jp, fontSize:12, fontWeight:700, color:C.accent }}>おまとめ商品の一部です</span>
          </div>
          <div style={{ fontFamily:C.jp, fontSize:11, color:C.muted, marginTop:4 }}>原価・転送送料のみ編集できます。売上情報はおまとめ側から編集してください。</div>
        </div>
      )}
      {/* ── 仕入れ情報 ── */}
      <CardSection title="仕入れ情報">
        <Field label="商品名" value={form.productName} onChange={set("productName")} placeholder="Canon AE-1 Black" col="1/-1" />
        <div style={{ gridColumn:"1/-1" }}>
          <span style={lblS()}>カテゴリ</span>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {[["camera","📷 カメラ"],["watch","⌚ 時計"],["bundle","📦 おまとめ"],["other","🏷️ その他"]].map(([v,l]) => (
              <button key={v} type="button" style={pillS(form.category===v,{padding:"6px 16px",fontSize:12})} onClick={()=>handleCategoryChange(v)}>{l}</button>
            ))}
          </div>
        </div>
        <DateField label="仕入れ日" value={form.purchaseDate} onChange={set("purchaseDate")} col="1/-1" />
        <Field label="原価（¥）" type="number" value={form.cost} onChange={set("cost")} placeholder="0" />
        <Field label="転送送料（¥）" type="number" value={form.storageShipping} onChange={set("storageShipping")} />
        <div style={{ gridColumn:"1/-1" }}>
          <span style={lblS()}>仕入れ先</span>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
            {["ヤフオク","メルカリ"].map(s => (
              <button key={s} type="button" style={pillS(form.source===s,{padding:"5px 14px",fontSize:12})} onClick={()=>setForm(p=>({...p,source:p.source===s?"":s}))}>{s}</button>
            ))}
            <input style={inpS({ flex:1, minWidth:120 })} type="text" placeholder="その他（直接入力）"
              value={["ヤフオク","メルカリ"].includes(form.source) ? "" : (form.source||"")}
              onChange={e => setForm(p=>({...p, source: e.target.value}))}
              onFocus={() => { if(["ヤフオク","メルカリ"].includes(form.source)) setForm(p=>({...p, source:""})); }}
            />
          </div>
        </div>
        <Field label="オークレボ管理番号" value={form.auctRevoId} onChange={set("auctRevoId")} placeholder="例：2585165" />
        <Field label="仕入れURL" value={form.purchaseUrl} onChange={set("purchaseUrl")} placeholder="https://..." col="1/-1" />
        <div style={{ gridColumn:"1/-1" }}>
          <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontFamily:C.jp, fontSize:13, color:C.textSub }}>
            <input type="checkbox" checked={form.isJunk} onChange={tog("isJunk")} style={{ width:16, height:16, accentColor:C.red }} />
            💀 損切り（ジャンク）
          </label>
          {form.isJunk && (
            <div style={{ marginTop:12, padding:"12px 14px", background:C.redLo, borderRadius:9, border:`1px solid ${C.red}28` }}>
              <span style={lblS({ color:C.red })}>損切り確定日</span>
              <DateField label="" value={form.junkDate??today()} onChange={set("junkDate")} />
              <div style={{ color:C.muted, fontSize:11, fontFamily:C.jp, marginTop:6 }}>この日付で集計に損失が反映されます</div>
            </div>
          )}
        </div>
      </CardSection>

      {/* ── eBay出品情報 ── */}
      <CardSection title="eBay出品情報" disabled={form.isJunk || isBundleMember}>
        <Field label="eBayタイトル" value={form.ebayTitle} onChange={set("ebayTitle")} placeholder="Canon AE-1 35mm SLR Film Camera Black [Near MINT]" col="1/-1" />
        <Field label="eBay URL" value={form.ebayUrl} onChange={set("ebayUrl")} placeholder="https://www.ebay.com/itm/..." col="1/-1" />
      </CardSection>

      {/* ── 落札情報 ── */}
      <div style={{ ...cardS({ marginBottom:14 }), ...((form.isJunk || isBundleMember) ? { opacity:.45, pointerEvents:"none" } : {}) }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp }}>▸ 落札情報</span>
          <select style={inpS({ width:"auto", fontSize:13, padding:"6px 12px", cursor:"pointer" })} value={form.status} onChange={set("status")}>
            <option value="unlisted">📝 未出品</option>
            <option value="unsold">📦 出品中</option>
            <option value="sold">✅ 売却済み</option>
            <option value="returned">↩️ 返品</option>
          </select>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, alignItems:"start" }}>
          <DateField label="落札日" value={form.saleDate} onChange={set("saleDate")} col="1/-1" />
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
              <span style={lblS({ marginBottom:0 })}>落札価格（$）</span>
              <button type="button" onClick={()=>{setShowOffer(v=>!v);if(!showOffer)setOfferPrice("");}}
                style={{ background:showOffer?C.accent:C.bg, color:showOffer?"#fff":C.accent, border:`1px solid ${showOffer?C.accent:C.accent+"50"}`, borderRadius:6, padding:"2px 8px", fontSize:10, fontWeight:700, fontFamily:C.jp, cursor:"pointer" }}>
                📊 オファー比較
              </button>
            </div>
            <input style={inpS()} type="text" inputMode="decimal" placeholder="0.00" value={form.salePrice??""} onChange={set("salePrice")} />
          </div>
          <Field label="落札送料（$）" type="number" value={form.saleShipping} onChange={set("saleShipping")} placeholder="0.00" />

          {/* オファー比較入力 */}
          {showOffer && (
            <div style={{ gridColumn:"1/-1", background:C.accentLo, borderRadius:10, padding:"12px 14px", border:`1px dashed ${C.accent}50` }}>
              <span style={lblS({ color:C.accent })}>オファー金額（$）</span>
              <input style={inpS({ background:"#fff", fontSize:18, fontWeight:700 })} type="text" inputMode="decimal" placeholder="0.00" value={offerPrice} onChange={e=>setOfferPrice(e.target.value)} />
            </div>
          )}

          {/* 為替レート */}
          <div style={{ minWidth:0 }}>
            <span style={lblS()}>為替レート {form.saleDate && <span style={{ color:C.green, fontSize:10 }}>🔒 売却後確定</span>}</span>
            <div style={{ display:"flex", gap:6 }}>
              <input style={inpS({ flex:1 })} type="text" inputMode="decimal" value={form.exchangeRate} onChange={set("exchangeRate")} />
              {!form.saleDate && (
                <button type="button" onClick={()=>fetchExchangeRate(r=>setForm(p=>({...p,exchangeRate:r})),setRateError,setRateLoading)} disabled={rateLoading}
                  style={{ ...btnS("secondary",{ padding:"0 10px", fontSize:11, flexShrink:0 }), ...(rateLoading?{opacity:.6}:{}) }}>
                  {rateLoading ? "…" : "🔄"}
                </button>
              )}
            </div>
            {rateError && <div style={{ color:C.red, fontSize:11, marginTop:4, fontFamily:C.jp }}>{rateError}</div>}
          </div>
          <Field label="eBay手数料率（%）" type="number" value={form.ebayFeeRate} onChange={set("ebayFeeRate")} />
          <Field label="プロモーション（%）" type="number" value={form.promotionRate} onChange={set("promotionRate")} />
          <Field label="国際送料＋手数料（¥）" type="number" value={form.intlShipping} onChange={set("intlShipping")} />

          {/* 送り先・DDP */}
          <div style={{ gridColumn:"1/-1", borderTop:`1px solid ${C.border}`, paddingTop:16, marginTop:4 }}>
            <span style={lblS()}>送り先</span>
            <select style={inpS({ cursor:"pointer" })} value={form.destination} onChange={set("destination")}>
              <option value="other">その他</option>
              <option value="us">🇺🇸 アメリカ（DDP）</option>
            </select>
          </div>
          {form.destination === "us" && (
            <div style={{ gridColumn:"1/-1", background:C.accentLo, borderRadius:10, padding:"12px 14px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
              <div>
                <span style={lblS()}>DDP上乗せ（$）</span>
                <div style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:C.accent, marginTop:6 }}>${autoDdp}</div>
                <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:2 }}>15% × $5刻み切上 / 最低$20</div>
              </div>
              <div>
                <span style={lblS()}>申告方法</span>
                <select style={inpS({ cursor:"pointer", marginTop:4 })} value={form.ddpMethod} onChange={set("ddpMethod")}>
                  <option value="">—</option>
                  <option value="①">①通常</option><option value="②">②五十嵐</option><option value="③">③石川</option>
                </select>
              </div>
              <div>
                <span style={lblS()}>実際DDP料金（¥）</span>
                <input style={inpS({ marginTop:4 })} type="text" inputMode="decimal" value={form.actualDdpFee??""} onChange={set("actualDdpFee")} />
                <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>
                  {form.actualDdpFee ? "✅ 実費入力済み" : `概算：${yen(+autoDdp * +(form.exchangeRate||158))}`}
                </div>
              </div>
            </div>
          )}

          {/* 返品フィールド */}
          {form.status === "returned" && (<>
            <DateField label="返品日" value={form.returnDate} onChange={set("returnDate")} col="1/-1" />
            <Field label="返品送料（¥）" type="number" value={form.returnShipping} onChange={set("returnShipping")} />
            <Field label="返品メモ" value={form.returnNotes} onChange={set("returnNotes")} placeholder="理由など" col="1/-1" />
          </>)}

          {/* 実際の手数料 */}
          {(form.status === "sold" || form.status === "returned") && (
            <div style={{ gridColumn:"1/-1", borderTop:`1px solid ${C.border}`, paddingTop:16, marginTop:4 }}>
              <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, marginBottom:12 }}>実際の手数料（確定後に入力）</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                <div>
                  <span style={lblS()}>eBay落札手数料（$）実費</span>
                  <input style={inpS()} type="text" inputMode="decimal" placeholder="空欄で概算を使用" value={form.actualEbayFeeUSD??""} onChange={set("actualEbayFeeUSD")} />
                  {!form.actualEbayFeeUSD && totalUSD > 0 && (
                    <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>現在の概算: <span style={{ fontFamily:C.num, color:C.textSub }}>${estEbayUSD.toFixed(2)}</span>（{form.ebayFeeRate}%）</div>
                  )}
                  {form.actualEbayFeeUSD && <div style={{ color:C.green, fontSize:10, fontFamily:C.jp, marginTop:3 }}>✅ 実費入力済み</div>}
                </div>
                <div>
                  <span style={lblS()}>プロモート費用（$）実費</span>
                  <input style={inpS()} type="text" inputMode="decimal" placeholder="空欄で概算を使用" value={form.actualPromoFeeUSD??""} onChange={set("actualPromoFeeUSD")} />
                  {!form.actualPromoFeeUSD && totalUSD > 0 && (
                    <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>現在の概算: <span style={{ fontFamily:C.num, color:C.textSub }}>${estPromoUSD.toFixed(2)}</span>（{form.promotionRate}%）</div>
                  )}
                  {form.actualPromoFeeUSD && <div style={{ color:C.green, fontSize:10, fontFamily:C.jp, marginTop:3 }}>✅ 実費入力済み</div>}
                </div>
              </div>

              {/* 返金セクション */}
              <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, marginBottom:12 }}>返金処理（一部返金・全額返金）</div>
              <div style={{ marginBottom:8 }}>
                <span style={lblS()}>返金タイプ</span>
                <div style={{ display:"flex", gap:8 }}>
                  {[["none","なし"],["partial","一部返金"],["full","全額返金"]].map(([v,l])=>(
                    <button key={v} type="button" style={pillS(form.refundType===v,{padding:"5px 14px",fontSize:12})} onClick={()=>setForm(p=>({...p,refundType:v}))}>{l}</button>
                  ))}
                </div>
              </div>
              {form.refundType !== "none" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, padding:"12px 14px", background:C.redLo, borderRadius:9, border:`1px solid ${C.red}28` }}>
                  <div>
                    <span style={lblS({ color:C.red })}>返金額（$）</span>
                    <input style={inpS({ background:"#fff" })} type="text" inputMode="decimal"
                      placeholder={form.refundType==="full" ? String((+form.salePrice)+(+form.saleShipping||0)) : "0.00"}
                      value={form.refundUSD??""} onChange={set("refundUSD")} />
                  </div>
                  <div>
                    <span style={lblS({ color:C.red })}>返金時の為替レート</span>
                    <input style={inpS({ background:"#fff" })} type="text" inputMode="decimal"
                      placeholder={String(form.exchangeRate)} value={form.refundExchangeRate??""} onChange={set("refundExchangeRate")} />
                    <div style={{ color:C.muted, fontSize:10, marginTop:4, fontFamily:C.jp }}>空欄なら落札時の為替を使用</div>
                  </div>
                  {+form.refundUSD > 0 && (
                    <div style={{ gridColumn:"1/-1", display:"flex", justifyContent:"flex-end" }}>
                      <span style={{ fontFamily:C.num, fontSize:13, color:C.red }}>返金額 △{yen(+form.refundUSD * (+form.refundExchangeRate || +form.exchangeRate))}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── 利益プレビュー ── */}
      {!isBundleMember && c && <ProfitBar label={showOffer ? "📌 出品価格での利益" : null} calc={c} />}
      {!isBundleMember && offerC && <ProfitBar label="📊 オファー価格での利益" calc={offerC} highlight />}
      {!isBundleMember && c && offerC && (
        <div style={{ ...cardS({ marginBottom:14, padding:14 }), background:"#f8f9ff", borderColor:`${C.accent}30` }}>
          <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent, marginBottom:8, letterSpacing:"0.06em" }}>差額</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
            {[
              ["決済差額", yen(offerC.totalJPY - c.totalJPY), C.text],
              ["利益差額", yen(offerC.profitJPY - c.profitJPY), offerC.profitJPY - c.profitJPY >= 0 ? C.green : C.red],
              ["利益率差", pct(offerC.profitRate - c.profitRate), offerC.profitRate - c.profitRate >= 0 ? C.green : C.red],
            ].map(([l,v,col],i) => (
              <div key={i} style={{ textAlign:"center", padding:"4px", borderLeft:i>0?`1px solid ${C.border}`:"none" }}>
                <span style={lblS({ display:"block", marginBottom:4 })}>{l}</span>
                <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 備考 ── */}
      {!isBundleMember && <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:12 }}>▸ 備考</div>
        <textarea style={{ ...inpS(), resize:"vertical", minHeight:60, fontFamily:C.jp, fontSize:13, lineHeight:1.6 }}
          placeholder="組み合わせ・関連商品など" value={form.notes||""} onChange={set("notes")} />
      </div>}

      {/* ── 写真 ── */}
      {!isBundleMember && <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:14 }}>▸ 写真</div>
        <PhotoUpload photos={form.photos||[]} onChange={photos=>setForm(p=>({...p,photos}))} />
      </div>}

      {/* ── 保存ボタン ── */}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={()=>onSave({ ...form, ddpSurcharge:form.destination==="us"?autoDdp:"0" })}
          style={btnS("primary",{ flex:1, justifyContent:"center", padding:13, fontSize:15 })}>
          {initial.id?"更新する":"追加する"}
        </button>
        <button onClick={onCancel} style={btnS("ghost",{ padding:"13px 20px" })}>キャンセル</button>
      </div>
    </div>
  );
}

        <DateField label="返品日" value={form.returnDate} onChange={set("returnDate")} />
        <div>
          <span style={lblS()}>返品送料・費用（¥）</span>
          <input style={inpS()} type="number" placeholder="0" value={form.returnShipping} onChange={set("returnShipping")} />
        </div>
        <div>
          <span style={lblS()}>メモ</span>
          <input style={inpS()} type="text" placeholder="理由・状況など" value={form.returnNotes} onChange={set("returnNotes")} />
        </div>
        <div style={{ display:"flex", gap:10, marginTop:4 }}>
          <button onClick={()=>onConfirm(form)} style={btnS("danger",{ flex:1, justifyContent:"center" })}>返品として完結する</button>

  );
}

// Split Modal
// ═══════════════════════════════════════════════════════════════
function SplitModal({ item, onConfirm, onClose }) {
  const [count, setCount] = useState(2);
  const [parts, setParts] = useState([
    { name: item.productName + " ①", cost: Math.floor((+item.cost||0)/2) },
    { name: item.productName + " ②", cost: Math.ceil((+item.cost||0)/2) },
  ]);
  const updateCount = (n) => {
    const c = Math.max(2, Math.min(10, +n));
    const base = Math.floor((+item.cost||0) / c);
    const extra = (+item.cost||0) - base * c;
    const nums = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
    setParts(Array.from({ length:c }, (_, i) => ({ name: item.productName + ` ${nums[i]||`(${i+1})`}`, cost: i === 0 ? base + extra : base })));
    setCount(c);
  };
  const setPart = (i, k, v) => setParts(p => p.map((x,idx) => idx===i ? {...x,[k]:v} : x));
  const totalCost = parts.reduce((s,p) => s + (+p.cost||0), 0);
  const origCost = +item.cost || 0;
  const diff = totalCost - origCost;
  return (
    <Modal title={`セット分割：${item.productName}`} onClose={onClose} width={500}>
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
          <span style={{ fontFamily:C.jp, fontSize:13, color:C.textSub }}>分割数</span>
          <div style={{ display:"flex", gap:6 }}>
            {[2,3,4,5].map(n => <button key={n} onClick={()=>updateCount(n)} style={pillS(count===n,{padding:"5px 14px"})}>{n}点</button>)}
          </div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {parts.map((p, i) => (
            <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:10, alignItems:"center", padding:"10px 12px", background:C.bg, borderRadius:9, border:`1px solid ${C.border}` }}>
              <input style={inpS({ background:"#fff", fontSize:13 })} type="text" value={p.name} onChange={e=>setPart(i,"name",e.target.value)} placeholder="商品名" />
              <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>

                <input style={inpS({ width:100, background:"#fff", fontSize:13 })} type="text" inputMode="decimal" value={p.cost} onChange={e=>setPart(i,"cost",e.target.value)} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:12, padding:"10px 14px", borderRadius:9, background: diff===0 ? C.greenLo : C.amberLo, border:`1px solid ${diff===0?C.green:C.amber}40` }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:C.num, fontSize:13 }}>
            <span style={{ color:C.textSub, fontFamily:C.jp }}>元の原価</span><span>{yen(origCost)}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:C.num, fontSize:13, marginTop:4 }}>
            <span style={{ color:C.textSub, fontFamily:C.jp }}>配分合計</span>
            <span style={{ color:diff===0?C.green:C.amber, fontWeight:700 }}>{yen(totalCost)} {diff!==0?`(${diff>0?"+":""}${yen(diff)})`:"✓"}</span>
          </div>
        </div>
      </div>
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={()=>onConfirm(parts)} style={btnS("primary",{ flex:1, justifyContent:"center" })}>分割して登録</button>
        <button onClick={onClose} style={btnS("ghost")}>キャンセル</button>
      </div>
    </Modal>
  );
}

// MiniCalc（デスクトップ右パネル上部）
// ═══════════════════════════════════════════════════════════════
function MiniCalc({ settings, onSettingsChange }) {
  const [mode, setMode]       = useState("forward");
  const [v, setV]             = useState("");
  const [showCfg, setShowCfg] = useState(false);
  const [cat, setCat]         = useState("camera");
  const [rateLoading, setRateLoading] = useState(false);
  const [rateError,   setRateError]   = useState("");

  const catS = settings[cat] || settings.camera;
  const cfg = { exchangeRate: settings.exchangeRate, ebayPct: catS.ebayPct, promoPct: catS.promoPct, shippingJPY: catS.shippingJPY, targetPct: catS.targetPct };

  const fwd = (mode==="forward" && v) ? quickCalc(+v, cfg) : null;
  const rev = (mode==="reverse" && v) ? (() => {
    const minUSD = (+v + cfg.shippingJPY) / (cfg.exchangeRate * (1 - (cfg.ebayPct+cfg.promoPct)/100 - cfg.targetPct/100));
    return { ...quickCalc(minUSD, cfg), minUSD };
  })() : null;

  const updateCatSetting = (key, val) => {
    onSettingsChange({ ...settings, [cat]: { ...settings[cat], [key]: +val } });
  };
  const updateRate = (val) => {
    onSettingsChange({ ...settings, exchangeRate: +val });
  };

  return (
    <div style={{ ...cardS({ padding:14, marginBottom:16 }), background:C.accentLo, border:`1px solid ${C.accent}28` }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <Calculator size={13} color={C.accent}/>
        <span style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent }}>仕入れ計算</span>
        <button onClick={()=>setShowCfg(o=>!o)} style={{ marginLeft:"auto", background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:11, fontFamily:C.jp, padding:0 }}>⚙ 設定</button>
      </div>

      {/* カテゴリ選択 */}
      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        {[["camera","📷 カメラ"],["watch","⌚ 時計"]].map(([k,l])=>(
          <button key={k} style={pillS(cat===k,{fontSize:10,padding:"4px 10px"})} onClick={()=>setCat(k)}>{l}</button>
        ))}
      </div>

      {/* モード切替 */}
      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        <button style={pillS(mode==="forward",{fontSize:10,padding:"4px 10px"})} onClick={()=>{setMode("forward");setV("");}}>出品価格→仕入上限</button>
        <button style={pillS(mode==="reverse",{fontSize:10,padding:"4px 10px"})} onClick={()=>{setMode("reverse");setV("");}}>仕入値→最低出品</button>
      </div>

      <div style={{ position:"relative" }}>
        <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:C.muted, fontFamily:C.num, pointerEvents:"none" }}>{mode==="forward"?"$":"¥"}</span>
        <input style={inpS({ paddingLeft:28, fontSize:18, fontWeight:700, height:42, background:"#fff" })}
          type="text" inputMode="decimal" placeholder={mode==="forward"?"出品価格":"仕入れ価格"} value={v} onChange={e=>setV(e.target.value)} />
      </div>
      {fwd && (
        <div style={{ marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 12px", background:"#fff", borderRadius:8 }}>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>仕入れ上限</span>
          <span style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:fwd.maxBuyJPY>0?C.green:C.red }}>{yen(fwd.maxBuyJPY)}</span>
        </div>
      )}
      {rev && (
        <div style={{ marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 12px", background:"#fff", borderRadius:8 }}>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>最低出品価格</span>
          <span style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:C.accent }}>{usd(rev.minUSD)}</span>
        </div>
      )}

      {/* 設定パネル */}
      {showCfg && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${C.border}` }}>
          {/* 為替（共通） */}
          <div style={{ marginBottom:10 }}>
            <span style={lblS()}>為替（¥/$）共通</span>
            <div style={{ display:"flex", gap:6 }}>
              <input style={inpS({ fontSize:12, padding:"5px 8px", background:"#fff", flex:1 })} type="text" inputMode="decimal" value={settings.exchangeRate} onChange={e=>updateRate(e.target.value)} />
              <button onClick={()=>fetchExchangeRate(r=>updateRate(r),setRateError,setRateLoading)} disabled={rateLoading}
                style={btnS("secondary",{ padding:"0 8px", fontSize:10, flexShrink:0 })}>{rateLoading?"…":"🔄"}</button>
            </div>
            {rateError && <div style={{ color:C.red, fontSize:10, marginTop:3 }}>{rateError}</div>}
          </div>
          {/* カテゴリ別設定 */}
          <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent, marginBottom:8 }}>
            {cat==="camera" ? "📷 カメラ設定" : "⌚ 時計設定"}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {[["ebayPct","eBay手数料（%）"],["promoPct","プロモ（%）"],["shippingJPY","送料（¥）"],["targetPct","目標利益（%）"]].map(([k,l])=>(
              <div key={k}>
                <span style={lblS()}>{l}</span>
                <input style={inpS({ fontSize:12, padding:"5px 8px", background:"#fff" })} type="text" inputMode="decimal" value={catS[k]} onChange={e=>updateCatSetting(k, e.target.value)} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

  const allMembers = [leader, ...members];

  const [form, setForm] = useState({
    productName: leader.productName || combinedName,

    intlShipping: leader.intlShipping || 6000,
    destination: leader.destination || "other",
    ddpMethod: leader.ddpMethod || "",
    actualDdpFee: leader.actualDdpFee || "",
    actualEbayFeeUSD: leader.actualEbayFeeUSD || "",
    actualPromoFeeUSD: leader.actualPromoFeeUSD || "",

  const set = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  const totalCost = costs.reduce((s,m) => s + (+m.cost||0), 0);
  const totalShipping = costs.reduce((s,m) => s + (+m.storageShipping||0), 0);

  const totalUSD = +form.salePrice + (+form.saleShipping||0) + (form.destination==="us" ? +autoDdp : 0);
