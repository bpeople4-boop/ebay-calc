              </div>
              <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, marginBottom:12 }}>返金処理</div>
              <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                {[["none","なし"],["partial","一部返金"],["full","全額返金"]].map(([v,l])=>(
                  <button key={v} type="button" style={pillS(form.refundType===v,{padding:"5px 14px",fontSize:12})} onClick={()=>setForm(p=>({...p,refundType:v}))}>{l}</button>
                ))}
              </div>
              {form.refundType!=="none" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, padding:"12px 14px", background:C.redLo, borderRadius:9, border:`1px solid ${C.red}28` }}>
                  <div><span style={lblS({ color:C.red })}>返金額（$）</span><input style={inpS({ background:"#fff" })} type="text" inputMode="decimal" value={form.refundUSD??""} onChange={set("refundUSD")} /></div>
                  <div><span style={lblS({ color:C.red })}>返金時の為替レート</span><input style={inpS({ background:"#fff" })} type="text" inputMode="decimal" placeholder={String(form.exchangeRate)} value={form.refundExchangeRate??""} onChange={set("refundExchangeRate")} /></div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── 利益プレビュー ── */}
      {c && <ProfitBar label={showOffer ? "📌 出品価格での利益" : null} calc={c} />}
      {offerC && <ProfitBar label="📊 オファー価格での利益" calc={offerC} highlight />}
      {c && offerC && (
        <div style={{ ...cardS({ marginBottom:14, padding:14 }), background:"#f8f9ff", borderColor:`${C.accent}30` }}>
          <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent, marginBottom:8 }}>差額</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
            {[["決済差額",yen(offerC.totalJPY-c.totalJPY),C.text],["利益差額",yen(offerC.profitJPY-c.profitJPY),offerC.profitJPY-c.profitJPY>=0?C.green:C.red],["利益率差",pct(offerC.profitRate-c.profitRate),offerC.profitRate-c.profitRate>=0?C.green:C.red]].map(([l,v,col],i)=>(
              <div key={i} style={{ textAlign:"center", padding:"4px", borderLeft:i>0?`1px solid ${C.border}`:"none" }}>
                <span style={lblS({ display:"block", marginBottom:4 })}>{l}</span>
                <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 備考・写真 ── */}
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:12 }}>▸ 備考</div>
        <textarea style={{ ...inpS(), resize:"vertical", minHeight:60, fontFamily:C.jp, fontSize:13, lineHeight:1.6 }} value={form.notes||""} onChange={set("notes")} />
      </div>
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:14 }}>▸ 写真</div>
        <PhotoUpload photos={form.photos||[]} onChange={photos=>setForm(p=>({...p,photos}))} />
      </div>

      {/* ── 保存 ── */}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={handleSave} style={btnS("primary",{ flex:1, justifyContent:"center", padding:13, fontSize:15 })}>更新する</button>
        <button onClick={onCancel} style={btnS("ghost",{ padding:"13px 20px" })}>キャンセル</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// Desktop Table
// ═══════════════════════════════════════════════════════════════
function DesktopTable({ items, selectedId, selectedBundleId, onRowClick, onBundleHeaderClick, onDelete, onReturn, onRelist, onBundleSale, onSplit }) {
  const [selecting, setSelecting] = useState(false);
  const [selSet, setSelSet]       = useState(new Set());
  const [search, setSearch]       = useState("");
  const [fStatus, setFStatus]     = useState("all");
  const [fYear,   setFYear]       = useState("all");
  const [sortAsc, setSortAsc]     = useState(false);
  const [fCat,    setFCat]        = useState("all");

  const years = [...new Set(items.map(i=>getYear(i.saleDate||i.purchaseDate)).filter(Boolean))].sort((a,b)=>b-a);

  const filtered = items.filter(i => {
    if (fStatus==="junk"     && !i.isJunk) return false;
    if (fStatus==="unlisted" && i.status!=="unlisted") return false;
    if (fStatus==="unsold"   && (i.status!=="unsold"||i.isJunk)) return false;
    if (fStatus==="sold"     && (i.status!=="sold"||i.isJunk)) return false;
    if (fStatus==="returned" && i.status!=="returned") return false;
    if (fYear!=="all" && getYear(i.saleDate||i.purchaseDate)!==+fYear) return false;
    if (fCat!=="all" && (i.category||"") !== fCat) return false;
    if (search) { const q=search.toLowerCase(); if(!i.productName?.toLowerCase().includes(q)&&!i.source?.toLowerCase().includes(q)&&!String(i.managementNumber||"").includes(q)&&!i.auctRevoId?.includes(q)) return false; }
    return true;
  });

  const bundleMap = {}; const singles = [];
  filtered.forEach(item => {
    if (item.bundleGroupId) { if(!bundleMap[item.bundleGroupId]) bundleMap[item.bundleGroupId]=[]; bundleMap[item.bundleGroupId].push(item); }
    else singles.push(item);
  });
  const groups = [];
  Object.entries(bundleMap).forEach(([gid,grp]) => {
    const leader=grp.find(i=>i.isBundleLeader)||grp[0]; const members=grp.filter(i=>i!==leader);
    groups.push({ type:"bundle", leader, members, key:gid, date:leader.purchaseDate });
  });
  singles.forEach(item => groups.push({ type:"single", item, key:item.id, date:item.purchaseDate }));
  groups.sort((a,b) => sortAsc ? (a.date||"").localeCompare(b.date||"") : (b.date||"").localeCompare(a.date||""));

  const isSold = i => !!(i.saleDate && !i.saleDate.startsWith("1900"));
  const soldCalcs    = filtered.filter(i=>isSold(i)&&(!i.bundleGroupId||i.isBundleLeader)).map(i=>calcFull(i)).filter(Boolean);
  const junkLoss     = filtered.filter(i=>i.isJunk&&!isSold(i)).reduce((s,i)=>s+(+i.cost||0)+(+i.storageShipping||0),0);
  const totalProfit  = soldCalcs.reduce((s,c)=>s+c.profitJPY,0)-junkLoss;
  const totalRevenue = soldCalcs.reduce((s,c)=>s+c.totalJPY,0);
  const avgRate      = soldCalcs.length ? soldCalcs.reduce((s,c)=>s+c.profitRate,0)/soldCalcs.length : 0;
  const unsoldCount  = filtered.filter(i=>!isSold(i)&&!i.isJunk).length;

  const startBundle = () => {
    const sel=items.filter(i=>selSet.has(i.id));
    if(sel.length<2){alert("2点以上選択してください");return;}
    onBundleSale(sel); setSelecting(false); setSelSet(new Set());
  };

  const TH = ({children,w,align="left"}) => (
    <th style={{ padding:"9px 12px", fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.muted, letterSpacing:"0.06em", textAlign:align, borderBottom:`2px solid ${C.border}`, background:C.surface, whiteSpace:"nowrap", position:"sticky", top:0, zIndex:5, ...(w?{width:w}:{}) }}>{children}</th>
  );

  const TR = ({item, bundleCalc, indent=false, isLastInBundle=false}) => {
    const [thumbLightbox, setThumbLightbox] = useState(null);
    const c = bundleCalc!==undefined ? bundleCalc : (item.isJunk&&!item.salePrice ? calcJunk(item) : calcFull(item));
    const isSel=selectedId===item.id, isChk=selSet.has(item.id);
    const thumb = item.photos?.[0];
    const bundleBg = indent ? "#f0f1ff" : "transparent";
    const rowBg = isSel ? C.accentLo : isChk ? "#eef3ff" : bundleBg;
    const handleRowClick = (e) => {
      if (selecting) { e.preventDefault(); setSelSet(prev=>{const n=new Set(prev);n.has(item.id)?n.delete(item.id):n.add(item.id);return n;}); }
      else if (item.bundleGroupId) { onBundleHeaderClick(item.bundleGroupId); }
      else onRowClick(item);
    };
    return (<>
      <tr onClick={handleRowClick}
        style={{ background:rowBg, cursor:"pointer", borderBottom: isLastInBundle ? `3px solid ${C.accent}40` : `1px solid ${C.border}`, transition:"background .08s" }}
        onMouseEnter={e=>{if(!isSel&&!isChk&&!indent)e.currentTarget.style.background="#f4f5fc";}}
        onMouseLeave={e=>{if(!isSel&&!isChk)e.currentTarget.style.background=rowBg;}}>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:11, color:C.muted, ...(indent ? { boxShadow:`inset 4px 0 0 ${C.accent}` } : {}) }}>
          {selecting ? <input type="checkbox" checked={isChk} readOnly style={{ accentColor:C.accent, width:14, height:14 }}/> : `#${item.managementNumber||"—"}`}
        </td>
        <td style={{ padding:"6px 8px", width:52 }} onClick={e=>{if(thumb){e.stopPropagation();setThumbLightbox(0);}}}>
          <div style={{ width:38, height:38, borderRadius:6, overflow:"hidden", border:`1px solid ${C.border}`, background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", cursor:thumb?"zoom-in":"default" }}>
            {thumb ? <img src={thumb} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <span style={{ color:C.border, fontSize:14 }}>📷</span>}
          </div>
        </td>
        <td style={{ padding:"9px 12px", maxWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            {indent && <span style={{ width:14, flexShrink:0, borderLeft:`2px solid ${C.border}`, height:14, display:"inline-block", marginLeft:6 }}/>}
            <div style={{ minWidth:0 }}>
              <div style={{ fontFamily:C.jp, fontSize:13, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.isJunk&&"💀 "}{item.productName||"—"}</div>
              {item.source&&<div style={{ fontFamily:C.jp, fontSize:11, color:C.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.source}</div>}
            </div>
          </div>
        </td>
        <td style={{ padding:"9px 12px", width:88 }}><StatusBadge item={item}/></td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:11, color:C.muted, width:86, whiteSpace:"nowrap" }}>{dt(item.purchaseDate)}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:11, color:C.muted, width:86, whiteSpace:"nowrap" }}>{item.saleDate ? dt(item.saleDate) : "—"}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:C.textSub, textAlign:"right", width:88 }}>{yen(item.cost)}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:C.textSub, textAlign:"right", width:76 }}>{item.salePrice?usd(item.salePrice):"—"}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:13, fontWeight:700, color:c?pColor(c.profitRate??-1):C.muted, textAlign:"right", width:96 }}>
          {c?(c.profitJPY>=0?"+":"")+yen(c.profitJPY):"—"}
        </td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:c?pColor(c.profitRate??-1):C.muted, textAlign:"right", width:64 }}>
          {c?(c.profitRate!=null?pct(c.profitRate):"損切り"):"—"}
        </td>
        <td style={{ padding:"9px 12px", width:88 }} onClick={e=>e.stopPropagation()}>
          <div style={{ display:"flex", gap:1, justifyContent:"flex-end" }}>
            <button onClick={()=>onRowClick(item)} title="編集" style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, padding:"4px 5px", borderRadius:5 }}><Pencil size={13}/></button>
            {item.status==="unsold"&&!item.bundleGroupId&&<button onClick={()=>onSplit(item)} title="分割" style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, padding:"4px 5px", borderRadius:5 }}>✂️</button>}
            {item.status==="sold"&&!item.bundleGroupId&&<button onClick={()=>onReturn(item)} title="返品" style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, padding:"4px 5px", borderRadius:5 }}><RotateCcw size={13}/></button>}
            {item.status==="returned"&&<button onClick={()=>onRelist(item)} title="再出品" style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, padding:"4px 5px", borderRadius:5 }}><Plus size={13}/></button>}
            <button onClick={()=>{if(window.confirm("削除しますか？"))onDelete(item.id);}} title="削除" style={{ background:"none", border:"none", cursor:"pointer", color:C.red, padding:"4px 5px", borderRadius:5 }}><Trash2 size={13}/></button>
          </div>
        </td>
      </tr>
      {thumbLightbox !== null && item.photos?.length > 0 && <PhotoLightbox photos={item.photos} startIndex={thumbLightbox} onClose={()=>setThumbLightbox(null)} />}
    </>);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, padding:"12px 18px", borderBottom:`1px solid ${C.border}`, background:C.bg, flexShrink:0 }}>
        {[["売却済み",`${soldCalcs.length} / ${filtered.length}点`,null,C.accent],["総売上",yen(totalRevenue),`${soldCalcs.length}件`,C.accent],["純利益",yen(totalProfit),junkLoss>0?`損切 △${yen(junkLoss)}`:"",totalProfit>=0?C.green:C.red],["平均利益率",pct(avgRate),`未売却 ${unsoldCount}点`,pColor(avgRate)]].map(([l,v,s,col])=>(
          <div key={l} style={{ background:C.card, borderRadius:9, padding:"9px 12px", border:`1px solid ${C.border}`, boxShadow:C.shadow }}>
            <div style={{ color:C.muted, fontSize:10, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, textTransform:"uppercase" }}>{l}</div>
            <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col, marginTop:3 }}>{v}</div>
            {s&&<div style={{ color:C.muted, fontSize:10, marginTop:1, fontFamily:C.jp }}>{s}</div>}
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:8, padding:"9px 18px", borderBottom:`1px solid ${C.border}`, flexWrap:"wrap", alignItems:"center", background:C.surface, flexShrink:0 }}>
        <input style={inpS({ width:190, height:32, fontSize:12, padding:"4px 10px" })} type="text" placeholder="🔍 商品名 / 管理番号 / オークレボ" value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{ display:"flex", gap:4 }}>
          {[["all","すべて"],["unlisted","未出品"],["unsold","出品中"],["sold","売却済み"],["returned","返品"],["junk","💀"]].map(([v,l])=>(
            <button key={v} style={pillS(fStatus===v,{padding:"3px 9px",fontSize:11})} onClick={()=>setFStatus(v)}>{l}</button>
          ))}
        </div>
        <select style={inpS({ width:88, height:32, fontSize:12, padding:"4px 7px", cursor:"pointer" })} value={fYear} onChange={e=>setFYear(e.target.value)}>
          <option value="all">全年度</option>
          {years.map(y=><option key={y} value={y}>{y}年</option>)}
        </select>
        <select style={inpS({ width:110, height:32, fontSize:12, padding:"4px 7px", cursor:"pointer" })} value={fCat} onChange={e=>setFCat(e.target.value)}>
          <option value="all">全カテゴリ</option>
          <option value="camera">📷 カメラ</option>
          <option value="watch">⌚ 時計</option>
          <option value="bundle">📦 おまとめ</option>
          <option value="other">🏷️ その他</option>
        </select>
        <button onClick={()=>setSortAsc(v=>!v)} style={btnS("secondary",{fontSize:11,padding:"4px 10px"})}>{sortAsc ? "🔼 古い順" : "🔽 新しい順"}</button>
        <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
          {!selecting
            ? <button onClick={()=>setSelecting(true)} style={btnS("secondary",{fontSize:11,padding:"4px 10px"})}><Link2 size={11}/>まとめ売り</button>
            : <><button onClick={startBundle} style={btnS("primary",{fontSize:11,padding:"4px 10px"})} disabled={selSet.size<2}><Link2 size={11}/>{selSet.size}点でまとめ</button><button onClick={()=>{setSelecting(false);setSelSet(new Set());}} style={btnS("ghost",{fontSize:11,padding:"4px 10px"})}>キャンセル</button></>
          }
        </div>
      </div>
      <div style={{ flex:1, overflowY:"auto" }}>
        {filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:"60px 20px", color:C.muted, fontFamily:C.jp }}>{items.length===0?"右パネルから商品を追加してください":"条件に合う商品がありません"}</div>
        ) : (
          <table style={{ width:"100%", borderCollapse:"collapse", tableLayout:"fixed" }}>
            <thead><tr><TH w={52}>#</TH><TH w={52}>画像</TH><TH>商品名</TH><TH w={88}>状態</TH><TH w={86}>仕入れ日</TH><TH w={86}>落札日</TH><TH w={88} align="right">原価</TH><TH w={76} align="right">落札$</TH><TH w={96} align="right">利益¥</TH><TH w={64} align="right">利益率</TH><TH w={88} align="right">操作</TH></tr></thead>
            <tbody>
              {groups.map(g => {
                if (g.type==="single") return <TR key={g.key} item={g.item}/>;
                const bc=calcBundle(g.leader, g.members);
                const allBI = [g.leader, ...g.members];
                const bCost = allBI.reduce((s,i)=>s+(+i.cost||0)+(+i.storageShipping||0),0);
                return [
                  <tr key={`${g.key}-hdr`} onClick={()=>onBundleHeaderClick(g.key)} style={{ background: selectedBundleId===g.key ? `${C.accent}30` : `${C.accent}18`, borderBottom:`1px solid ${C.accent}30`, cursor:"pointer", transition:"background .1s" }}
                    onMouseEnter={e=>{if(selectedBundleId!==g.key)e.currentTarget.style.background=`${C.accent}25`;}}
                    onMouseLeave={e=>{if(selectedBundleId!==g.key)e.currentTarget.style.background=`${C.accent}18`;}}>
                    <td colSpan={11} style={{ padding:"8px 14px", boxShadow:`inset 4px 0 0 ${C.accent}` }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <Link2 size={13} color={C.accent}/>
                        <div>
                          <span style={{ fontFamily:C.jp, fontSize:12, fontWeight:700, color:C.accent }}>📦 まとめ売り（{allBI.length}点）</span>
                          <span style={{ fontFamily:C.num, fontSize:11, color:C.muted, marginLeft:10 }}>原価合計 {yen(bCost)}{g.leader.salePrice ? ` → ${usd(g.leader.salePrice)}` : ""}</span>
                        </div>
                        {bc&&(<div style={{ marginLeft:"auto", display:"flex", gap:14, alignItems:"center" }}>
                          <span style={{ fontFamily:C.num, fontSize:13, fontWeight:700, color:pColor(bc.profitRate) }}>{bc.profitJPY>=0?"+":""}{yen(bc.profitJPY)}</span>
                          <span style={{ fontFamily:C.num, fontSize:12, fontWeight:700, color:pColor(bc.profitRate), background:`${pColor(bc.profitRate)}15`, padding:"2px 8px", borderRadius:5 }}>{pct(bc.profitRate)}</span>
                        </div>)}
                      </div>
                    </td>
                  </tr>,
                  <TR key={g.leader.id} item={g.leader} bundleCalc={bc} indent isLastInBundle={g.members.length===0}/>,
                  ...g.members.map((m,mi)=><TR key={m.id} item={m} bundleCalc={null} indent isLastInBundle={mi===g.members.length-1}/>)
                ];
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// Desktop App Layout
// ═══════════════════════════════════════════════════════════════
function DesktopApp({ items, onSave, onDelete, onReturn, onReturnConfirm, onRelist, onCreateBundle, onBundleSaveEdit, onSplit, onImport, onExport, returnItem, setReturnItem, splitItem, setSplitItem, onSplitConfirm, settings, onSettingsChange }) {
  const [selectedId, setSelectedId] = useState(null);
  const [selectedBundleGroupId, setSelectedBundleGroupId] = useState(null);
  const [formKey, setFormKey]       = useState(0);
  const [panelW, setPanelW]         = useState(480);
  const [dragging, setDragging]     = useState(false);
  const [saved, setSaved]           = useState(false);
  const [showLeft, setShowLeft]     = useState(true);

  const selectedItem = selectedId ? items.find(i=>i.id===selectedId) : null;

  // Bundle editing
  const bundleGroupItems = selectedBundleGroupId ? items.filter(i=>i.bundleGroupId===selectedBundleGroupId) : [];
  const bundleLeader = bundleGroupItems.find(i=>i.isBundleLeader) || bundleGroupItems[0];
  const bundleMembers = bundleGroupItems.filter(i=>i!==bundleLeader);

  const startDrag = (e) => {
    e.preventDefault();
    const startX = e.clientX, startW = panelW;
    const onMove = (ev) => setPanelW(Math.max(380, Math.min(800, startW + (startX - ev.clientX))));
    const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); setDragging(false); };
    setDragging(true);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  };

  const handleSaveAndReset = (form) => {
    onSave(form);
    if (!form.id) { setSelectedId(null); setSelectedBundleGroupId(null); setFormKey(k => k + 1); setSaved(true); }
  };
  const openNewForm = () => { setSelectedId(null); setSelectedBundleGroupId(null); setFormKey(k=>k+1); setSaved(false); };
  const openEdit = (item) => { setSelectedId(item.id); setSelectedBundleGroupId(null); setSaved(false); };
  const openBundleEdit = (groupId) => { setSelectedBundleGroupId(groupId); setSelectedId(null); setSaved(false); };

  // まとめ売り作成 → 即バンドル化＋右パネルで編集
  const handleBundleSale = (selectedItems) => {
    const gid = genId();
    onCreateBundle(gid, selectedItems);
    setSelectedBundleGroupId(gid);
    setSelectedId(null);
    setSaved(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" }}>
      {/* Header */}
      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"0 24px", display:"flex", alignItems:"center", gap:12, height:50, flexShrink:0, boxShadow:C.shadow }}>
        <Calculator size={16} color={C.accent}/>
        <span style={{ fontFamily:C.jp, fontWeight:700, fontSize:15, color:C.text }}>eBay 利益計算</span>
        <span style={{ color:C.muted, fontSize:11, fontFamily:C.num, background:C.bg, padding:"2px 7px", borderRadius:5, border:`1px solid ${C.border}` }}>v3</span>

        {/* 左パネル開閉ボタン */}
        <button onClick={()=>setShowLeft(v=>!v)} title={showLeft?"テーブルを閉じる":"テーブルを開く"}

function App() {

  const [loaded,      setLoaded]      = useState(false);
  const [settings,    setSettings]    = useState(DEFAULT_SETTINGS);
  const [returnItem,  setReturnItem]  = useState(null);

  useEffect(() => {
    (async()=>{
      try { const r=await window.storage.get("ebay_v3_settings"); if(r?.value) setSettings(prev=>({...DEFAULT_SETTINGS,...JSON.parse(r.value)})); } catch(_){}
      try {
        const r=await window.storage.get("ebay_v2_items");
        if(r?.value) {
          const loaded = JSON.parse(r.value);
          const corrected = loaded.map(i => {
            const hasSaleDate = !!(i.saleDate && i.saleDate !== "" && !i.saleDate.startsWith("1900"));
            // 落札日あり → sold、なし → 既存statusを優先しつつ"sold"なら"unsold"に補正
            if (hasSaleDate && i.status !== "returned") return { ...i, status: "sold" };
            if (!hasSaleDate && i.status === "sold") return { ...i, status: "unsold" };
            return i;
          });
          setItems(corrected);

  const handleSave = (form) => {
    if (form.id) { setItems(p => p.map(i => i.id===form.id ? form : i)); }

  const handleDelete       = (id)    => setItems(p => p.filter(i => i.id!==id));
  const handleReturnOpen   = (item)  => setReturnItem(item);

    setItems(p => p.map(i => i.id===returnItem.id ? { ...i, status:"returned", ...form } : i));
    setReturnItem(null);
  };
  const handleRelist = (item) => {
    setItems(p => [{ ...item, id:genId(), managementNumber:nextNo(p), cost:0, storageShipping:0, salePrice:"", saleDate:"", saleShipping:"", status:"unsold", returnDate:"", returnShipping:"", returnNotes:"", relistFromId:item.id, bundleGroupId:null, isBundleLeader:false }, ...p]);
  };
  const handleSplitConfirm = (parts) => {
    const orig = splitItem;
    const newItems = parts.map((p, i) => ({
      ...orig, id: genId(),
      managementNumber: i === 0 ? orig.managementNumber : nextNo([...items, ...parts.slice(0,i).map((_,j)=>({managementNumber:String(+orig.managementNumber+j+1)}))]),
      productName: p.name, cost: +p.cost || 0,
      storageShipping: i === 0 ? orig.storageShipping : 0,
      notes: `${orig.productName}より分割`, splitFromId: orig.id,
    }));
    setItems(p => [...newItems, ...p.filter(i => i.id !== orig.id)]);
    setSplitItem(null);
  };
  const handleCreateBundle = (gid, selectedItems) => {
    const combinedName = selectedItems.map(i=>i.productName||"—").join(" + ");
    setItems(p => p.map(i => {
      const sel = selectedItems.find(s=>s.id===i.id);
      if (!sel) return i;
      const isLeader = sel.id===selectedItems[0].id;
      if (isLeader) {
        return { ...i, bundleGroupId:gid, isBundleLeader:true, category:"bundle",
                 productName: combinedName, salePrice:"", saleShipping:"", status:"unsold" };
      } else {
        return { ...i, bundleGroupId:gid, isBundleLeader:false,
                 salePrice:"", saleShipping:"" };
      }
    }));
  };
  const handleBundleSaveEdit = (groupId, { leaderData, memberCosts }) => {
    setItems(p => p.map(i => {
      if (i.bundleGroupId !== groupId) return i;
      const mc = memberCosts.find(c => c.id === i.id);
      if (i.isBundleLeader) {
        // リーダーに売上情報 + 原価を保存
        return { ...i, ...leaderData, ...(mc ? { cost: mc.cost, storageShipping: mc.storageShipping } : {}) };
      } else {
        // メンバーの原価・転送送料を更新、ステータスと落札日を同期
        return { ...i, ...(mc ? { cost: mc.cost, storageShipping: mc.storageShipping } : {}), status: leaderData.status || i.status, saleDate: leaderData.saleDate || i.saleDate };
      }
    }));
  };
  const handleImport = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=(ev)=>{
      try {
        const d=JSON.parse(ev.target.result);
        if(!Array.isArray(d)){alert("形式が正しくありません");return;}
        setItems(d.map(i=>{
          const hasSaleDate = !!(i.saleDate && i.saleDate !== "" && !i.saleDate.startsWith("1900"));
          let status = i.status || "unsold";
          if (hasSaleDate && status !== "returned") status = "sold";
          if (!hasSaleDate && status === "sold") status = "unsold";
          return { ...i, id: i.id||genId(), status };
        }));
        alert(`✅ ${d.length}件を取り込みました`);
      } catch(e) { alert("読み込み失敗"); }
    };
    r.readAsText(file); e.target.value="";
  };
  const handleExport = () => {
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(items,null,2)],{type:"application/json"}));
    a.download=`ebay_data_${new Date().toISOString().slice(0,10)}.json`; a.click();

    * { box-sizing:border-box; margin:0; padding:0; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#b0b4d0; border-radius:4px; }
    button:hover { opacity:.85; }
    a { color:inherit; }
  `;

  if (!loaded) return <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:C.bg, fontFamily:C.jp, color:C.muted }}>読み込み中...</div>;

  return (
    <div style={{ fontFamily:C.jp, background:C.bg }}>
      <style>{globalStyle}</style>
      <DesktopApp
        items={items} onSave={handleSave} onDelete={handleDelete}
        onReturn={handleReturnOpen} onReturnConfirm={handleReturnConfirm}
        onRelist={handleRelist}
        onCreateBundle={handleCreateBundle} onBundleSaveEdit={handleBundleSaveEdit}
        onSplit={setSplitItem} onSplitConfirm={handleSplitConfirm}
        onImport={handleImport} onExport={handleExport}
        returnItem={returnItem}   setReturnItem={setReturnItem}
        splitItem={splitItem}     setSplitItem={setSplitItem}
        settings={settings}       onSettingsChange={setSettings}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

// ── Calculation ───────────────────────────────────────────────
function quickCalc(usd_, { exchangeRate=158, ebayPct=12, promoPct=2, shippingJPY=6000, targetPct=15 } = {}) {
  const s = usd_ * exchangeRate;
  const ebayFeeJPY = s * (ebayPct / 100);
  const promoFeeJPY = s * (promoPct / 100);
  return {
    salesJPY: s, ebayFeeJPY, promoFeeJPY,
    targetProfJPY: s * (targetPct / 100),
    shippingJPY,
    maxBuyJPY: s * (1 - (ebayPct + promoPct) / 100 - targetPct / 100) - shippingJPY,
  };
}

function calcFull(item, overrideCost = null) {
  const { salePrice=0, saleShipping=0, ddpSurcharge=0, exchangeRate=158,
          ebayFeeRate=12, promotionRate=2, cost=0, storageShipping=0, intlShipping=6000,
          actualDdpFee="", actualEbayFeeUSD="", actualPromoFeeUSD="",
          refundUSD="", refundExchangeRate="", refundType="none",
          destination="other" } = item;
  if (!+salePrice) return null;
  const totalUSD  = +salePrice + +saleShipping + +ddpSurcharge;
  const totalJPY  = totalUSD * +exchangeRate;
  const ebayBase  = +actualEbayFeeUSD  ? +actualEbayFeeUSD  * +exchangeRate : totalJPY * (+ebayFeeRate / 100);
  const promoFee  = +actualPromoFeeUSD ? +actualPromoFeeUSD * +exchangeRate : totalJPY * (+promotionRate / 100);
  const totalFee  = ebayBase + promoFee;
  const usedCost  = overrideCost ?? (+cost + +storageShipping);
  const ddpCostJPY = +actualDdpFee ? +actualDdpFee : (destination === "us" ? +ddpSurcharge * +exchangeRate : 0);
  const isActualDdp = !!+actualDdpFee;
  const refundJPY = refundType !== "none" && +refundUSD ? +refundUSD * (+refundExchangeRate || +exchangeRate) : 0;
  const profitJPY = totalJPY - totalFee - usedCost - +intlShipping - ddpCostJPY - refundJPY;
  const isActual  = !!(+actualEbayFeeUSD || +actualPromoFeeUSD);
  return { totalUSD, totalJPY, ebayBase, promoFee, totalFee, usedCost, profitJPY, profitRate: profitJPY / totalJPY, isActual, isActualDdp, ddpCostJPY, refundJPY };
}

function calcJunk(item) {
  const loss = (+item.cost || 0) + (+item.storageShipping || 0);
  return { profitJPY: -loss, profitRate: null, isJunkCalc: true };
}

function calcBundle(leader, members) {
  const totalCost = [...members, leader].reduce((s, i) => s + (+i.cost||0) + (+i.storageShipping||0), 0);
  return calcFull(leader, totalCost);
}

// ── Modal ─────────────────────────────────────────────────────

// ── PhotoLightbox ─────────────────────────────────────────────
function PhotoLightbox({ photos, startIndex=0, onClose }) {
  const [idx, setIdx] = useState(startIndex);
  const prev = () => setIdx(i => (i - 1 + photos.length) % photos.length);
  const next = () => setIdx(i => (i + 1) % photos.length);
  useEffect(() => {
    const handler = e => { if(e.key==="ArrowLeft") prev(); if(e.key==="ArrowRight") next(); if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.92)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={onClose}>
      <button onClick={e=>{e.stopPropagation();prev();}} style={{ position:"absolute", left:16, background:"rgba(255,255,255,.15)", border:"none", borderRadius:"50%", width:40, height:40, cursor:"pointer", color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
      <img src={photos[idx]} alt="" onClick={e=>e.stopPropagation()} style={{ maxWidth:"92vw", maxHeight:"88vh", borderRadius:10, objectFit:"contain", boxShadow:"0 8px 40px rgba(0,0,0,.6)" }} />
      <button onClick={e=>{e.stopPropagation();next();}} style={{ position:"absolute", right:16, background:"rgba(255,255,255,.15)", border:"none", borderRadius:"50%", width:40, height:40, cursor:"pointer", color:"#fff", fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
      <button onClick={onClose} style={{ position:"absolute", top:16, right:16, background:"rgba(255,255,255,.15)", border:"none", borderRadius:"50%", width:36, height:36, cursor:"pointer", color:"#fff", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}><X size={16}/></button>
      {photos.length > 1 && <div style={{ position:"absolute", bottom:20, color:"rgba(255,255,255,.7)", fontSize:13, fontFamily:C.num }}>{idx+1} / {photos.length}</div>}
    </div>
  );
}

// ── PhotoUpload ───────────────────────────────────────────────
function PhotoUpload({ photos=[], onChange }) {
  const [lightbox, setLightbox] = useState(null);
  const handleFiles = async (e) => {
    const files = [...e.target.files];
    const resized = await Promise.all(files.map(f => resizeImage(f)));
    onChange([...photos, ...resized]);
    e.target.value = "";
  };
  const remove = (i, ev) => { ev.stopPropagation(); onChange(photos.filter((_,idx)=>idx!==i)); };
  return (
    <div>
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom: photos.length ? 8 : 0 }}>
        {photos.map((src, i) => (
          <div key={i} style={{ position:"relative", width:72, height:72, borderRadius:8, overflow:"hidden", cursor:"pointer", border:`2px solid ${C.border}`, flexShrink:0 }} onClick={()=>setLightbox(i)}>
            <img src={src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
            <button onClick={e=>remove(i,e)} style={{ position:"absolute", top:2, right:2, background:"rgba(0,0,0,.6)", border:"none", borderRadius:"50%", width:18, height:18, cursor:"pointer", color:"#fff", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>×</button>
          </div>
        ))}
        <label style={{ width:72, height:72, borderRadius:8, border:`2px dashed ${C.border}`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", cursor:"pointer", color:C.muted, fontSize:11, fontFamily:C.jp, flexShrink:0, background:C.bg }}>
          <span style={{ fontSize:22, lineHeight:1 }}>+</span>
          <span style={{ marginTop:3 }}>写真</span>
          <input type="file" accept="image/*" multiple onChange={handleFiles} style={{ display:"none" }} />
        </label>
      </div>
      {lightbox !== null && <PhotoLightbox photos={photos} startIndex={lightbox} onClose={()=>setLightbox(null)} />}
    </div>
  );
}

// ── Field / DateField / CardSection ───────────────────────────
function Field({ label, type="text", placeholder, col, readOnly, disabled, value, onChange, sub }) {
  const isNum = type === "number";
  const locked = readOnly || disabled;
  return (
    <div style={{ gridColumn:col, minWidth:0 }}>
      <span style={lblS()}>{label}</span>
      <input
        style={inpS(locked ? { background:"#f0f1f7", color:C.muted, borderStyle:"dashed" } : {})}
        type={isNum ? "text" : type}
        inputMode={isNum ? "decimal" : undefined}
        placeholder={placeholder}
        readOnly={locked}
        value={value ?? ""}
        onChange={locked ? undefined : onChange}
      />
      {sub && <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>{sub}</div>}
    </div>
  );
}

function DateField({ label, value, onChange, col }) {
  const ref = useRef(null);
  const openPicker = () => { if (ref.current) { ref.current.showPicker ? ref.current.showPicker() : ref.current.click(); } };
  return (
    <div style={{ gridColumn:col, minWidth:0 }}>
      <span style={lblS()}>{label}</span>
      <div style={{ position:"relative" }}>
        <div onClick={openPicker} style={{ ...inpS({ cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", userSelect:"none" }) }}>
          <span style={{ color: value ? C.text : C.muted }}>{value ? dt(value) : "日付を選択"}</span>
          <span style={{ color:C.muted, fontSize:16, lineHeight:1 }}>📅</span>
        </div>
        <input ref={ref} type="date" value={value||""} onChange={onChange} style={{ position:"absolute", opacity:0, width:0, height:0, top:0, left:0, pointerEvents:"none" }} />
      </div>
    </div>
  );
}

function CardSection({ title, children, disabled }) {
  return (
    <div style={{ ...cardS({ marginBottom:14 }), ...(disabled ? { opacity:.45, pointerEvents:"none" } : {}) }}>
      <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:16 }}>▸ {title}</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, alignItems:"start" }}>{children}</div>
    </div>
  );
}

  );

// Split Modal
// ═══════════════════════════════════════════════════════════════
function SplitModal({ item, onConfirm, onClose }) {
  const [count, setCount] = useState(2);
  const [parts, setParts] = useState([
    { name: item.productName + " ①", cost: Math.floor((+item.cost||0)/2) },
    { name: item.productName + " ②", cost: Math.ceil((+item.cost||0)/2) },
  ]);
  const updateCount = (n) => {
    const c = Math.max(2, Math.min(10, +n));
    const base = Math.floor((+item.cost||0) / c);
    const extra = (+item.cost||0) - base * c;
    const nums = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
    setParts(Array.from({ length:c }, (_, i) => ({ name: item.productName + ` ${nums[i]||`(${i+1})`}`, cost: i === 0 ? base + extra : base })));
    setCount(c);
  };
  const setPart = (i, k, v) => setParts(p => p.map((x,idx) => idx===i ? {...x,[k]:v} : x));
  const totalCost = parts.reduce((s,p) => s + (+p.cost||0), 0);
  const origCost = +item.cost || 0;
  const diff = totalCost - origCost;
  return (
    <Modal title={`セット分割：${item.productName}`} onClose={onClose} width={500}>
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
          <span style={{ fontFamily:C.jp, fontSize:13, color:C.textSub }}>分割数</span>
          <div style={{ display:"flex", gap:6 }}>
            {[2,3,4,5].map(n => <button key={n} onClick={()=>updateCount(n)} style={pillS(count===n,{padding:"5px 14px"})}>{n}点</button>)}
          </div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {parts.map((p, i) => (
            <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:10, alignItems:"center", padding:"10px 12px", background:C.bg, borderRadius:9, border:`1px solid ${C.border}` }}>
              <input style={inpS({ background:"#fff", fontSize:13 })} type="text" value={p.name} onChange={e=>setPart(i,"name",e.target.value)} placeholder="商品名" />
              <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                <span style={{ color:C.muted, fontSize:12, fontFamily:C.num }}>¥</span>
                <input style={inpS({ width:100, background:"#fff", fontSize:13 })} type="text" inputMode="decimal" value={p.cost} onChange={e=>setPart(i,"cost",e.target.value)} />
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop:12, padding:"10px 14px", borderRadius:9, background: diff===0 ? C.greenLo : C.amberLo, border:`1px solid ${diff===0?C.green:C.amber}40` }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:C.num, fontSize:13 }}>
            <span style={{ color:C.textSub, fontFamily:C.jp }}>元の原価</span><span>{yen(origCost)}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontFamily:C.num, fontSize:13, marginTop:4 }}>
            <span style={{ color:C.textSub, fontFamily:C.jp }}>配分合計</span>
            <span style={{ color:diff===0?C.green:C.amber, fontWeight:700 }}>{yen(totalCost)} {diff!==0?`(${diff>0?"+":""}${yen(diff)})`:"✓"}</span>
          </div>
        </div>
      </div>
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={()=>onConfirm(parts)} style={btnS("primary",{ flex:1, justifyContent:"center" })}>分割して登録</button>
        <button onClick={onClose} style={btnS("ghost")}>キャンセル</button>
      </div>
    </Modal>
  );
}

// MiniCalc（デスクトップ右パネル上部）
// ═══════════════════════════════════════════════════════════════
function MiniCalc({ settings, onSettingsChange }) {
  const [mode, setMode]       = useState("forward");
  const [v, setV]             = useState("");
  const [showCfg, setShowCfg] = useState(false);
  const [cat, setCat]         = useState("camera");
  const [rateLoading, setRateLoading] = useState(false);
  const [rateError,   setRateError]   = useState("");

  const catS = settings[cat] || settings.camera;
  const cfg = { exchangeRate: settings.exchangeRate, ebayPct: catS.ebayPct, promoPct: catS.promoPct, shippingJPY: catS.shippingJPY, targetPct: catS.targetPct };

  const fwd = (mode==="forward" && v) ? quickCalc(+v, cfg) : null;
  const rev = (mode==="reverse" && v) ? (() => {
    const minUSD = (+v + cfg.shippingJPY) / (cfg.exchangeRate * (1 - (cfg.ebayPct+cfg.promoPct)/100 - cfg.targetPct/100));
    return { ...quickCalc(minUSD, cfg), minUSD };
  })() : null;

  const updateCatSetting = (key, val) => {
    onSettingsChange({ ...settings, [cat]: { ...settings[cat], [key]: +val } });
  };
  const updateRate = (val) => {
    onSettingsChange({ ...settings, exchangeRate: +val });
  };

  return (
    <div style={{ ...cardS({ padding:14, marginBottom:16 }), background:C.accentLo, border:`1px solid ${C.accent}28` }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <Calculator size={13} color={C.accent}/>
        <span style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent }}>仕入れ計算</span>
        <button onClick={()=>setShowCfg(o=>!o)} style={{ marginLeft:"auto", background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:11, fontFamily:C.jp, padding:0 }}>⚙ 設定</button>
      </div>

      {/* カテゴリ選択 */}
      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        {[["camera","📷 カメラ"],["watch","⌚ 時計"]].map(([k,l])=>(
          <button key={k} style={pillS(cat===k,{fontSize:10,padding:"4px 10px"})} onClick={()=>setCat(k)}>{l}</button>
        ))}
      </div>

      {/* モード切替 */}
      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        <button style={pillS(mode==="forward",{fontSize:10,padding:"4px 10px"})} onClick={()=>{setMode("forward");setV("");}}>出品価格→仕入上限</button>
        <button style={pillS(mode==="reverse",{fontSize:10,padding:"4px 10px"})} onClick={()=>{setMode("reverse");setV("");}}>仕入値→最低出品</button>
      </div>

      <div style={{ position:"relative" }}>
        <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:C.muted, fontFamily:C.num, pointerEvents:"none" }}>{mode==="forward"?"$":"¥"}</span>
        <input style={inpS({ paddingLeft:28, fontSize:18, fontWeight:700, height:42, background:"#fff" })}
          type="text" inputMode="decimal" placeholder={mode==="forward"?"出品価格":"仕入れ価格"} value={v} onChange={e=>setV(e.target.value)} />
      </div>
      {fwd && (
        <div style={{ marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 12px", background:"#fff", borderRadius:8 }}>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>仕入れ上限</span>
          <span style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:fwd.maxBuyJPY>0?C.green:C.red }}>{yen(fwd.maxBuyJPY)}</span>
        </div>
      )}
      {rev && (
        <div style={{ marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 12px", background:"#fff", borderRadius:8 }}>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>最低出品価格</span>
          <span style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:C.accent }}>{usd(rev.minUSD)}</span>
        </div>
      )}

      {/* 設定パネル */}
      {showCfg && (
        <div style={{ marginTop:10, paddingTop:10, borderTop:`1px solid ${C.border}` }}>
          {/* 為替（共通） */}
          <div style={{ marginBottom:10 }}>
            <span style={lblS()}>為替（¥/$）共通</span>
            <div style={{ display:"flex", gap:6 }}>
              <input style={inpS({ fontSize:12, padding:"5px 8px", background:"#fff", flex:1 })} type="text" inputMode="decimal" value={settings.exchangeRate} onChange={e=>updateRate(e.target.value)} />
              <button onClick={()=>fetchExchangeRate(r=>updateRate(r),setRateError,setRateLoading)} disabled={rateLoading}
                style={btnS("secondary",{ padding:"0 8px", fontSize:10, flexShrink:0 })}>{rateLoading?"…":"🔄"}</button>
            </div>
            {rateError && <div style={{ color:C.red, fontSize:10, marginTop:3 }}>{rateError}</div>}
          </div>
          {/* カテゴリ別設定 */}
          <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent, marginBottom:8 }}>
            {cat==="camera" ? "📷 カメラ設定" : "⌚ 時計設定"}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {[["ebayPct","eBay手数料（%）"],["promoPct","プロモ（%）"],["shippingJPY","送料（¥）"],["targetPct","目標利益（%）"]].map(([k,l])=>(
              <div key={k}>
                <span style={lblS()}>{l}</span>
                <input style={inpS({ fontSize:12, padding:"5px 8px", background:"#fff" })} type="text" inputMode="decimal" value={catS[k]} onChange={e=>updateCatSetting(k, e.target.value)} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// BundleEditForm（まとめ売り編集フォーム）
// ═══════════════════════════════════════════════════════════════
function BundleEditForm({ leader, members, onSave, onCancel, settings }) {
  const allMembers = [leader, ...members];
  const combinedName = allMembers.map(i => i.productName || "—").join(" + ");

  const [form, setForm] = useState({
    productName: leader.productName || combinedName,
    auctRevoId: leader.auctRevoId || "",
    ebayTitle: leader.ebayTitle || "",
    ebayUrl: leader.ebayUrl || "",
    category: "bundle",
    saleDate: leader.saleDate || "",
    salePrice: leader.salePrice || "",
    saleShipping: leader.saleShipping || "",
    exchangeRate: leader.exchangeRate || settings.exchangeRate,
    ebayFeeRate: leader.ebayFeeRate || 12,
    promotionRate: leader.promotionRate || 2,
    intlShipping: leader.intlShipping || 6000,
    destination: leader.destination || "other",
    ddpMethod: leader.ddpMethod || "",
    actualDdpFee: leader.actualDdpFee || "",
    actualEbayFeeUSD: leader.actualEbayFeeUSD || "",
    actualPromoFeeUSD: leader.actualPromoFeeUSD || "",
    refundUSD: leader.refundUSD || "",
    refundExchangeRate: leader.refundExchangeRate || "",
    refundType: leader.refundType || "none",
    status: leader.status || "unsold",
    notes: leader.notes || "",
    photos: leader.photos || [],
  });
  const [costs, setCosts] = useState(
    allMembers.map(i => ({ id:i.id, name:i.productName||"—", cost:String(i.cost||0), storageShipping:String(i.storageShipping||0), managementNumber:i.managementNumber }))
  );
  const [rateLoading, setRateLoading] = useState(false);
  const [rateError,   setRateError]   = useState("");
  const [showOffer,   setShowOffer]   = useState(false);
  const [offerPrice,  setOfferPrice]  = useState("");

  const set = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const setCost = (idx, k, v) => setCosts(p => p.map((c,i) => i===idx ? {...c,[k]:v} : c));

  const totalCost = costs.reduce((s,m) => s + (+m.cost||0), 0);
  const totalShipping = costs.reduce((s,m) => s + (+m.storageShipping||0), 0);
  const grandCost = totalCost + totalShipping;

  const autoDdp = form.destination==="us" ? ddpCalc(form.salePrice, form.saleShipping).toFixed(2) : "0";
  const calcItem = { ...form, cost:grandCost, storageShipping:0, ddpSurcharge:form.destination==="us"?autoDdp:0 };
  const c = calcFull(calcItem);
  const offerCalcItem = { ...calcItem, salePrice: offerPrice };
  const offerC = showOffer && +offerPrice ? calcFull(offerCalcItem) : null;

  const totalUSD = +form.salePrice + (+form.saleShipping||0) + (form.destination==="us" ? +autoDdp : 0);
  const estEbayUSD = totalUSD * (+form.ebayFeeRate||12) / 100;
  const estPromoUSD = totalUSD * (+form.promotionRate||2) / 100;

  const handleSave = () => {
    onSave({
      leaderData: { ...form, ddpSurcharge:form.destination==="us"?autoDdp:"0" },
      memberCosts: costs.map(c => ({ id:c.id, cost:+c.cost||0, storageShipping:+c.storageShipping||0 })),
    });
  };

  const ProfitBar = ({ label, calc, highlight }) => (
    <div style={{ ...cardS({ marginBottom:8, padding:14 }), borderColor:`${pColor(calc.profitRate)}40`, background: highlight ? `${pColor(calc.profitRate)}08` : pBg(calc.profitRate) }}>
      {label && <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.muted, marginBottom:10, letterSpacing:"0.06em" }}>{label}</div>}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
        {[["決済合計",yen(calc.totalJPY),C.text],["最終利益",yen(calc.profitJPY),pColor(calc.profitRate)],["利益率",pct(calc.profitRate),pColor(calc.profitRate)]].map(([l,v,col],i)=>(
          <div key={i} style={{ textAlign:"center", padding:"4px", borderLeft:i>0?`1px solid ${C.border}`:"none" }}>
            <span style={lblS({ display:"block", marginBottom:4 })}>{l}</span>
            <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col }}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      {/* ── まとめ売り概要 ── */}
      <div style={{ ...cardS({ marginBottom:14 }), background:`${C.accent}08`, borderColor:`${C.accent}30` }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
          <Link2 size={16} color={C.accent}/>
          <span style={{ color:C.accent, fontSize:13, fontWeight:700, fontFamily:C.jp }}>📦 まとめ売り（{allMembers.length}点）</span>
        </div>
        <div style={{ marginBottom:12 }}>
          <span style={lblS()}>商品名</span>
          <input style={inpS()} type="text" value={form.productName} onChange={set("productName")} />
        </div>
        <Field label="オークレボ管理番号" value={form.auctRevoId} onChange={set("auctRevoId")} placeholder="例：2585165" />
      </div>

      {/* ── 原価内訳 ── */}
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:14 }}>▸ 原価内訳</div>
        {costs.map((m, idx) => (
          <div key={m.id} style={{ display:"grid", gridTemplateColumns:"auto 1fr auto auto", gap:10, alignItems:"center", padding:"8px 10px", background:idx%2===0?C.bg:"transparent", borderRadius:8, marginBottom:4 }}>
            <span style={{ color:C.muted, fontFamily:C.num, fontSize:11, flexShrink:0 }}>#{m.managementNumber}</span>
            <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.name}</span>
            <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
              <span style={{ color:C.muted, fontSize:10, fontFamily:C.jp }}>原価</span>
              <input style={inpS({ width:90, fontSize:12, padding:"5px 8px" })} type="text" inputMode="decimal" value={m.cost} onChange={e=>setCost(idx,"cost",e.target.value)} />
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
              <span style={{ color:C.muted, fontSize:10, fontFamily:C.jp }}>転送</span>
              <input style={inpS({ width:80, fontSize:12, padding:"5px 8px" })} type="text" inputMode="decimal" value={m.storageShipping} onChange={e=>setCost(idx,"storageShipping",e.target.value)} />
            </div>
          </div>
        ))}
        <div style={{ display:"flex", justifyContent:"flex-end", gap:16, marginTop:10, padding:"8px 12px", background:C.accentLo, borderRadius:8 }}>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>原価合計 <span style={{ fontFamily:C.num, fontWeight:700, color:C.text }}>{yen(totalCost)}</span></span>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.textSub }}>転送合計 <span style={{ fontFamily:C.num, fontWeight:700, color:C.text }}>{yen(totalShipping)}</span></span>
          <span style={{ fontFamily:C.jp, fontSize:12, color:C.accent, fontWeight:700 }}>総額 <span style={{ fontFamily:C.num }}>{yen(grandCost)}</span></span>
        </div>
      </div>

      {/* ── eBay出品情報 ── */}
      <CardSection title="eBay出品情報">
        <Field label="eBayタイトル" value={form.ebayTitle} onChange={set("ebayTitle")} placeholder="Canon AE-1 + FD 50mm Lens SET [Near MINT]" col="1/-1" />
        <Field label="eBay URL" value={form.ebayUrl} onChange={set("ebayUrl")} placeholder="https://www.ebay.com/itm/..." col="1/-1" />
      </CardSection>

      {/* ── 落札情報 ── */}
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp }}>▸ 落札情報</span>
          <select style={inpS({ width:"auto", fontSize:13, padding:"6px 12px", cursor:"pointer" })} value={form.status} onChange={set("status")}>
            <option value="unlisted">📝 未出品</option>
            <option value="unsold">📦 出品中</option>
            <option value="sold">✅ 売却済み</option>
            <option value="returned">↩️ 返品</option>
          </select>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, alignItems:"start" }}>
          <DateField label="落札日" value={form.saleDate} onChange={set("saleDate")} col="1/-1" />
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
              <span style={lblS({ marginBottom:0 })}>落札価格（$）</span>
              <button type="button" onClick={()=>{setShowOffer(v=>!v);if(!showOffer)setOfferPrice("");}}
                style={{ background:showOffer?C.accent:C.bg, color:showOffer?"#fff":C.accent, border:`1px solid ${showOffer?C.accent:C.accent+"50"}`, borderRadius:6, padding:"2px 8px", fontSize:10, fontWeight:700, fontFamily:C.jp, cursor:"pointer" }}>
                📊 オファー比較
              </button>
            </div>
            <input style={inpS()} type="text" inputMode="decimal" placeholder="0.00" value={form.salePrice??""} onChange={set("salePrice")} />
          </div>
          <Field label="落札送料（$）" type="number" value={form.saleShipping} onChange={set("saleShipping")} placeholder="0.00" />

          {showOffer && (
            <div style={{ gridColumn:"1/-1", background:C.accentLo, borderRadius:10, padding:"12px 14px", border:`1px dashed ${C.accent}50` }}>
              <span style={lblS({ color:C.accent })}>オファー金額（$）</span>
              <input style={inpS({ background:"#fff", fontSize:18, fontWeight:700 })} type="text" inputMode="decimal" placeholder="0.00" value={offerPrice} onChange={e=>setOfferPrice(e.target.value)} />
            </div>
          )}

          <div style={{ minWidth:0 }}>
            <span style={lblS()}>為替レート</span>
            <div style={{ display:"flex", gap:6 }}>
              <input style={inpS({ flex:1 })} type="text" inputMode="decimal" value={form.exchangeRate} onChange={set("exchangeRate")} />
              <button type="button" onClick={()=>fetchExchangeRate(r=>setForm(p=>({...p,exchangeRate:r})),setRateError,setRateLoading)} disabled={rateLoading}
                style={{ ...btnS("secondary",{ padding:"0 10px", fontSize:11, flexShrink:0 }), ...(rateLoading?{opacity:.6}:{}) }}>
                {rateLoading?"…":"🔄"}
              </button>
            </div>
            {rateError && <div style={{ color:C.red, fontSize:11, marginTop:4 }}>{rateError}</div>}
          </div>
          <Field label="eBay手数料率（%）" type="number" value={form.ebayFeeRate} onChange={set("ebayFeeRate")} />
          <Field label="プロモーション（%）" type="number" value={form.promotionRate} onChange={set("promotionRate")} />
          <Field label="国際送料＋手数料（¥）" type="number" value={form.intlShipping} onChange={set("intlShipping")} />

          <div style={{ gridColumn:"1/-1", borderTop:`1px solid ${C.border}`, paddingTop:16, marginTop:4 }}>
            <span style={lblS()}>送り先</span>
            <select style={inpS({ cursor:"pointer" })} value={form.destination} onChange={set("destination")}>
              <option value="other">その他</option>
              <option value="us">🇺🇸 アメリカ（DDP）</option>
            </select>
          </div>
          {form.destination==="us" && (
            <div style={{ gridColumn:"1/-1", background:C.accentLo, borderRadius:10, padding:"12px 14px", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
              <div>
                <span style={lblS()}>DDP上乗せ（$）</span>
                <div style={{ fontFamily:C.num, fontSize:20, fontWeight:700, color:C.accent, marginTop:6 }}>${autoDdp}</div>
                <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:2 }}>最低$20</div>
              </div>
              <div>
                <span style={lblS()}>申告方法</span>
                <select style={inpS({ cursor:"pointer", marginTop:4 })} value={form.ddpMethod} onChange={set("ddpMethod")}><option value="">—</option><option value="①">①通常</option><option value="②">②五十嵐</option><option value="③">③石川</option></select>
              </div>
              <div>
                <span style={lblS()}>実際DDP料金（¥）</span>
                <input style={inpS({ marginTop:4 })} type="text" inputMode="decimal" value={form.actualDdpFee??""} onChange={set("actualDdpFee")} />
              </div>
            </div>
          )}

          {(form.status==="sold"||form.status==="returned") && (
            <div style={{ gridColumn:"1/-1", borderTop:`1px solid ${C.border}`, paddingTop:16, marginTop:4 }}>
              <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, marginBottom:12 }}>実際の手数料（確定後に入力）</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                <div>
                  <span style={lblS()}>eBay手数料（$）実費</span>
                  <input style={inpS()} type="text" inputMode="decimal" placeholder="空欄で概算を使用" value={form.actualEbayFeeUSD??""} onChange={set("actualEbayFeeUSD")} />
                  {!form.actualEbayFeeUSD && totalUSD>0 && <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>概算: <span style={{ fontFamily:C.num, color:C.textSub }}>${estEbayUSD.toFixed(2)}</span>（{form.ebayFeeRate}%）</div>}
                </div>
                <div>
                  <span style={lblS()}>プロモート費用（$）実費</span>
                  <input style={inpS()} type="text" inputMode="decimal" placeholder="空欄で概算を使用" value={form.actualPromoFeeUSD??""} onChange={set("actualPromoFeeUSD")} />
                  {!form.actualPromoFeeUSD && totalUSD>0 && <div style={{ color:C.muted, fontSize:10, fontFamily:C.jp, marginTop:3 }}>概算: <span style={{ fontFamily:C.num, color:C.textSub }}>${estPromoUSD.toFixed(2)}</span>（{form.promotionRate}%）</div>}
                </div>
              </div>
              <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.08em", fontFamily:C.jp, marginBottom:12 }}>返金処理</div>
              <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                {[["none","なし"],["partial","一部返金"],["full","全額返金"]].map(([v,l])=>(
                  <button key={v} type="button" style={pillS(form.refundType===v,{padding:"5px 14px",fontSize:12})} onClick={()=>setForm(p=>({...p,refundType:v}))}>{l}</button>
                ))}
              </div>
              {form.refundType!=="none" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, padding:"12px 14px", background:C.redLo, borderRadius:9, border:`1px solid ${C.red}28` }}>
                  <div><span style={lblS({ color:C.red })}>返金額（$）</span><input style={inpS({ background:"#fff" })} type="text" inputMode="decimal" value={form.refundUSD??""} onChange={set("refundUSD")} /></div>
                  <div><span style={lblS({ color:C.red })}>返金時の為替レート</span><input style={inpS({ background:"#fff" })} type="text" inputMode="decimal" placeholder={String(form.exchangeRate)} value={form.refundExchangeRate??""} onChange={set("refundExchangeRate")} /></div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── 利益プレビュー ── */}
      {c && <ProfitBar label={showOffer ? "📌 出品価格での利益" : null} calc={c} />}
      {offerC && <ProfitBar label="📊 オファー価格での利益" calc={offerC} highlight />}
      {c && offerC && (
        <div style={{ ...cardS({ marginBottom:14, padding:14 }), background:"#f8f9ff", borderColor:`${C.accent}30` }}>
          <div style={{ fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.accent, marginBottom:8 }}>差額</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr" }}>
            {[["決済差額",yen(offerC.totalJPY-c.totalJPY),C.text],["利益差額",yen(offerC.profitJPY-c.profitJPY),offerC.profitJPY-c.profitJPY>=0?C.green:C.red],["利益率差",pct(offerC.profitRate-c.profitRate),offerC.profitRate-c.profitRate>=0?C.green:C.red]].map(([l,v,col],i)=>(
              <div key={i} style={{ textAlign:"center", padding:"4px", borderLeft:i>0?`1px solid ${C.border}`:"none" }}>
                <span style={lblS({ display:"block", marginBottom:4 })}>{l}</span>
                <div style={{ fontFamily:C.num, fontSize:16, fontWeight:700, color:col }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 備考・写真 ── */}
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:12 }}>▸ 備考</div>
        <textarea style={{ ...inpS(), resize:"vertical", minHeight:60, fontFamily:C.jp, fontSize:13, lineHeight:1.6 }} value={form.notes||""} onChange={set("notes")} />
      </div>
      <div style={cardS({ marginBottom:14 })}>
        <div style={{ color:C.accent, fontSize:11, fontWeight:700, letterSpacing:"0.1em", fontFamily:C.jp, marginBottom:14 }}>▸ 写真</div>
        <PhotoUpload photos={form.photos||[]} onChange={photos=>setForm(p=>({...p,photos}))} />
      </div>

      {/* ── 保存 ── */}
      <div style={{ display:"flex", gap:10 }}>
        <button onClick={handleSave} style={btnS("primary",{ flex:1, justifyContent:"center", padding:13, fontSize:15 })}>更新する</button>
        <button onClick={onCancel} style={btnS("ghost",{ padding:"13px 20px" })}>キャンセル</button>
      </div>
    </div>
  );
}

// Desktop Table
// ═══════════════════════════════════════════════════════════════
function DesktopTable({ items, selectedId, selectedBundleId, onRowClick, onBundleHeaderClick, onDelete, onReturn, onRelist, onBundleSale, onSplit }) {
  const [selecting, setSelecting] = useState(false);
  const [selSet, setSelSet]       = useState(new Set());
  const [search, setSearch]       = useState("");
  const [fStatus, setFStatus]     = useState("all");
  const [fYear,   setFYear]       = useState("all");
  const [sortAsc, setSortAsc]     = useState(false);
  const [fCat,    setFCat]        = useState("all");

  const years = [...new Set(items.map(i=>getYear(i.saleDate||i.purchaseDate)).filter(Boolean))].sort((a,b)=>b-a);

  const filtered = items.filter(i => {
    if (fStatus==="junk"     && !i.isJunk) return false;
    if (fStatus==="unlisted" && i.status!=="unlisted") return false;
    if (fStatus==="unsold"   && (i.status!=="unsold"||i.isJunk)) return false;
    if (fStatus==="sold"     && (i.status!=="sold"||i.isJunk)) return false;
    if (fStatus==="returned" && i.status!=="returned") return false;
    if (fYear!=="all" && getYear(i.saleDate||i.purchaseDate)!==+fYear) return false;
    if (fCat!=="all" && (i.category||"") !== fCat) return false;
    if (search) { const q=search.toLowerCase(); if(!i.productName?.toLowerCase().includes(q)&&!i.source?.toLowerCase().includes(q)&&!String(i.managementNumber||"").includes(q)&&!i.auctRevoId?.includes(q)) return false; }
    return true;
  });

  const bundleMap = {}; const singles = [];
  filtered.forEach(item => {
    if (item.bundleGroupId) { if(!bundleMap[item.bundleGroupId]) bundleMap[item.bundleGroupId]=[]; bundleMap[item.bundleGroupId].push(item); }
    else singles.push(item);
  });
  const groups = [];
  Object.entries(bundleMap).forEach(([gid,grp]) => {
    const leader=grp.find(i=>i.isBundleLeader)||grp[0]; const members=grp.filter(i=>i!==leader);
    groups.push({ type:"bundle", leader, members, key:gid, date:leader.purchaseDate });
  });
  singles.forEach(item => groups.push({ type:"single", item, key:item.id, date:item.purchaseDate }));
  groups.sort((a,b) => sortAsc ? (a.date||"").localeCompare(b.date||"") : (b.date||"").localeCompare(a.date||""));

  const isSold = i => !!(i.saleDate && !i.saleDate.startsWith("1900"));
  const soldCalcs    = filtered.filter(i=>isSold(i)&&(!i.bundleGroupId||i.isBundleLeader)).map(i=>calcFull(i)).filter(Boolean);
  const junkLoss     = filtered.filter(i=>i.isJunk&&!isSold(i)).reduce((s,i)=>s+(+i.cost||0)+(+i.storageShipping||0),0);
  const totalProfit  = soldCalcs.reduce((s,c)=>s+c.profitJPY,0)-junkLoss;
  const totalRevenue = soldCalcs.reduce((s,c)=>s+c.totalJPY,0);
  const avgRate      = soldCalcs.length ? soldCalcs.reduce((s,c)=>s+c.profitRate,0)/soldCalcs.length : 0;
  const unsoldCount  = filtered.filter(i=>!isSold(i)&&!i.isJunk).length;

  const startBundle = () => {
    const sel=items.filter(i=>selSet.has(i.id));
    if(sel.length<2){alert("2点以上選択してください");return;}
    onBundleSale(sel); setSelecting(false); setSelSet(new Set());
  };

  const TH = ({children,w,align="left"}) => (
    <th style={{ padding:"9px 12px", fontFamily:C.jp, fontSize:11, fontWeight:700, color:C.muted, letterSpacing:"0.06em", textAlign:align, borderBottom:`2px solid ${C.border}`, background:C.surface, whiteSpace:"nowrap", position:"sticky", top:0, zIndex:5, ...(w?{width:w}:{}) }}>{children}</th>
  );

  const TR = ({item, bundleCalc, indent=false, isLastInBundle=false}) => {
    const [thumbLightbox, setThumbLightbox] = useState(null);
    const c = bundleCalc!==undefined ? bundleCalc : (item.isJunk&&!item.salePrice ? calcJunk(item) : calcFull(item));
    const isSel=selectedId===item.id, isChk=selSet.has(item.id);
    const thumb = item.photos?.[0];
    const bundleBg = indent ? "#f0f1ff" : "transparent";
    const rowBg = isSel ? C.accentLo : isChk ? "#eef3ff" : bundleBg;
    const handleRowClick = (e) => {
      if (selecting) { e.preventDefault(); setSelSet(prev=>{const n=new Set(prev);n.has(item.id)?n.delete(item.id):n.add(item.id);return n;}); }
      else if (item.bundleGroupId) { onBundleHeaderClick(item.bundleGroupId); }
      else onRowClick(item);
    };
    return (<>
      <tr onClick={handleRowClick}
        style={{ background:rowBg, cursor:"pointer", borderBottom: isLastInBundle ? `3px solid ${C.accent}40` : `1px solid ${C.border}`, transition:"background .08s" }}
        onMouseEnter={e=>{if(!isSel&&!isChk&&!indent)e.currentTarget.style.background="#f4f5fc";}}
        onMouseLeave={e=>{if(!isSel&&!isChk)e.currentTarget.style.background=rowBg;}}>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:11, color:C.muted, ...(indent ? { boxShadow:`inset 4px 0 0 ${C.accent}` } : {}) }}>
          {selecting ? <input type="checkbox" checked={isChk} readOnly style={{ accentColor:C.accent, width:14, height:14 }}/> : `#${item.managementNumber||"—"}`}
        </td>
        <td style={{ padding:"6px 8px", width:52 }} onClick={e=>{if(thumb){e.stopPropagation();setThumbLightbox(0);}}}>
          <div style={{ width:38, height:38, borderRadius:6, overflow:"hidden", border:`1px solid ${C.border}`, background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", cursor:thumb?"zoom-in":"default" }}>
            {thumb ? <img src={thumb} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <span style={{ color:C.border, fontSize:14 }}>📷</span>}
          </div>
        </td>
        <td style={{ padding:"9px 12px", maxWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
            {indent && <span style={{ width:14, flexShrink:0, borderLeft:`2px solid ${C.border}`, height:14, display:"inline-block", marginLeft:6 }}/>}
            <div style={{ minWidth:0 }}>
              <div style={{ fontFamily:C.jp, fontSize:13, fontWeight:600, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.isJunk&&"💀 "}{item.productName||"—"}</div>
              {item.source&&<div style={{ fontFamily:C.jp, fontSize:11, color:C.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.source}</div>}
            </div>
          </div>
        </td>
        <td style={{ padding:"9px 12px", width:88 }}><StatusBadge item={item}/></td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:11, color:C.muted, width:86, whiteSpace:"nowrap" }}>{dt(item.purchaseDate)}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:C.textSub, textAlign:"right", width:88 }}>{yen(item.cost)}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:C.textSub, textAlign:"right", width:76 }}>{item.salePrice?usd(item.salePrice):"—"}</td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:13, fontWeight:700, color:c?pColor(c.profitRate??-1):C.muted, textAlign:"right", width:96 }}>
          {c?(c.profitJPY>=0?"+":"")+yen(c.profitJPY):"—"}
        </td>
        <td style={{ padding:"9px 12px", fontFamily:C.num, fontSize:12, color:c?pColor(c.profitRate??-1):C.muted, textAlign:"right", width:64 }}>
          {c?(c.profitRate!=null?pct(c.profitRate):"損切り"):"—"}
        </td>
        <td style={{ padding:"9px 12px", width:88 }} onClick={e=>e.stopPropagation()}>
          <div style={{ display:"flex", gap:1, justifyContent:"flex-end" }}>
            <button onClick={()=>onRowClick(item)} title="編集" style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, padding:"4px 5px", borderRadius:5 }}><Pencil size={13}/></button>
            {item.status==="unsold"&&!item.bundleGroupId&&<button onClick={()=>onSplit(item)} title="分割" style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, padding:"4px 5px", borderRadius:5 }}>✂️</button>}
            {item.status==="sold"&&!item.bundleGroupId&&<button onClick={()=>onReturn(item)} title="返品" style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, padding:"4px 5px", borderRadius:5 }}><RotateCcw size={13}/></button>}
            {item.status==="returned"&&<button onClick={()=>onRelist(item)} title="再出品" style={{ background:"none", border:"none", cursor:"pointer", color:C.accent, padding:"4px 5px", borderRadius:5 }}><Plus size={13}/></button>}
            <button onClick={()=>{if(window.confirm("削除しますか？"))onDelete(item.id);}} title="削除" style={{ background:"none", border:"none", cursor:"pointer", color:C.red, padding:"4px 5px", borderRadius:5 }}><Trash2 size={13}/></button>
          </div>
        </td>
      </tr>
      {thumbLightbox !== null && item.photos?.length > 0 && <PhotoLightbox photos={item.photos} startIndex={thumbLightbox} onClose={()=>setThumbLightbox(null)} />}

  return (

        {[["売却済み",`${soldCalcs.length} / ${filtered.length}点`,null,C.accent],["総売上",yen(totalRevenue),`${soldCalcs.length}件`,C.accent],["純利益",yen(totalProfit),junkLoss>0?`損切 △${yen(junkLoss)}`:"",totalProfit>=0?C.green:C.red],["平均利益率",pct(avgRate),`未売却 ${unsoldCount}点`,pColor(avgRate)]].map(([l,v,s,col])=>(
          <div key={l} style={{ background:C.card, borderRadius:9, padding:"9px 12px", border:`1px solid ${C.border}`, boxShadow:C.shadow }}>

        <div style={{ display:"flex", gap:4 }}>
          {[["all","すべて"],["unlisted","未出品"],["unsold","出品中"],["sold","売却済み"],["returned","返品"],["junk","💀"]].map(([v,l])=>(
            <button key={v} style={pillS(fStatus===v,{padding:"3px 9px",fontSize:11})} onClick={()=>setFStatus(v)}>{l}</button>
          ))}

          <option value="all">全年度</option>
          {years.map(y=><option key={y} value={y}>{y}年</option>)}
        </select>
        <select style={inpS({ width:110, height:32, fontSize:12, padding:"4px 7px", cursor:"pointer" })} value={fCat} onChange={e=>setFCat(e.target.value)}>

            <tbody>

                if (g.type==="single") return <TR key={g.key} item={g.item}/>;
                const bc=calcBundle(g.leader, g.members);

                const bCost = allBI.reduce((s,i)=>s+(+i.cost||0)+(+i.storageShipping||0),0);

                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                        <div>
