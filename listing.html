<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay 出品アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surf:#161b24;--surf2:#1e2535;--bdr:#2a3348;
      --txt:#e4e8f4;--mut:#6e7a9e;
      --acc:#f5a623;--acc-lo:rgba(245,166,35,.12);
      --blu:#4f8ef7;--blu-lo:rgba(79,142,247,.1);
      --grn:#3fb950;--red:#f87171;
      --jp:'Noto Sans JP',sans-serif;
      --ui:'DM Sans',var(--jp),sans-serif;
      --mono:'DM Mono',monospace;
    }
    html,body,#root{height:100%;overflow:hidden;width:100%}
    body{background:var(--bg);color:var(--txt);font-family:var(--ui);font-size:14px}
    #root{display:flex}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

    /* ── Sidebar (item list) ── */
    .sidebar{width:230px;min-width:230px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
    .sh{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
    .st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--mut)}
    .cnt{background:var(--acc-lo);color:var(--acc);border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700}
    .ilist{flex:1;overflow-y:auto;padding:6px}
    .icard{padding:9px 12px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .12s}
    .icard:hover{background:var(--surf2);border-color:var(--bdr)}
    .icard.sel{background:var(--acc-lo);border-color:rgba(245,166,35,.45)}
    .ino{font-size:10px;color:var(--mut);font-family:var(--mono);margin-bottom:1px}
    .inm{font-size:12px;font-weight:500;line-height:1.4;word-break:break-all}
    .icost{font-size:11px;color:var(--mut);margin-top:2px}

    /* ── Form panel ── */
    .fpanel{flex:1.1;min-width:380px;display:flex;flex-direction:column;border-right:1px solid var(--bdr)}
    .fpanel-header{padding:9px 18px;border-bottom:1px solid var(--bdr);background:var(--surf);display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:40px}
    .fhtxt{font-size:13px;font-weight:600;color:var(--acc);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fcontent{flex:1;overflow-y:auto;padding:16px}

    /* ── Right panel (output) ── */
    .rpanel{flex:1;min-width:400px;display:flex;flex-direction:column;background:var(--bg)}
    .rtabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--surf);flex-shrink:0;padding:0 12px}
    .rtab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--mut);transition:all .15s;white-space:nowrap;user-select:none}
    .rtab:hover{color:var(--txt)}
    .rtab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
    .rcontent{flex:1;overflow-y:auto;padding:16px}

    /* ── Form sections ── */
    .sec{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:14px;margin-bottom:12px}
    .sttl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--mut);margin-bottom:10px}

    label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px;margin-top:10px}
    label:first-of-type{margin-top:0}
    input[type=text],textarea,select{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:var(--ui);font-size:13px;padding:6px 10px;outline:none;transition:border-color .15s}
    input[type=text]:focus,textarea:focus,select:focus{border-color:var(--acc)}
    select option{background:var(--surf2)}
    textarea{resize:vertical;min-height:60px}

    /* type grid */
    .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
    .tbtn{padding:7px 4px;border:1px solid var(--bdr);border-radius:6px;text-align:center;cursor:pointer;font-size:11px;color:var(--mut);transition:all .12s;background:var(--bg);user-select:none}
    .tbtn:hover{border-color:var(--acc)}
    .tbtn.on{border-color:var(--acc);background:var(--acc-lo);color:var(--acc);font-weight:700}

    /* condition */
    .cwrap{display:flex;flex-wrap:wrap;gap:4px}
    .cbtn{padding:4px 10px;border:1px solid var(--bdr);border-radius:5px;cursor:pointer;font-size:12px;color:var(--mut);transition:all .12s;background:var(--bg);user-select:none;white-space:nowrap}
    .cbtn:hover{border-color:var(--acc)}
    .cbtn.on{border-color:var(--acc);background:var(--acc-lo);color:var(--acc);font-weight:700}

    /* optics */
    .opbox{border:1px solid var(--bdr);border-radius:7px;padding:11px;margin-bottom:8px;background:var(--bg)}
    .opbtl{font-size:11px;font-weight:700;color:var(--txt);margin-bottom:8px}
    .overall-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
    .ovbtn{padding:3px 9px;border:1px solid var(--bdr);border-radius:4px;font-size:11px;cursor:pointer;background:var(--surf);color:var(--mut);transition:all .1s;user-select:none;white-space:nowrap}
    .ovbtn.on{border-color:var(--acc);background:var(--acc-lo);color:var(--acc);font-weight:600}
    .oprow{display:flex;align-items:center;gap:7px;margin-bottom:6px}
    .oplbl{width:90px;font-size:11px;color:var(--mut);flex-shrink:0}
    .tg{display:flex;gap:3px;flex-shrink:0}
    .tgbtn{padding:3px 8px;border:1px solid var(--bdr);border-radius:4px;font-size:11px;cursor:pointer;background:var(--surf);color:var(--mut);transition:all .1s;user-select:none}
    .tgbtn.nn.on{border-color:var(--grn);background:rgba(63,185,80,.1);color:var(--grn)}
    .tgbtn.pp.on{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
    .opni{flex:1;font-size:11px;padding:3px 7px;min-width:0}

    /* bundles */
    .bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
    .bi{display:flex;align-items:center;gap:7px;padding:5px 10px;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;background:var(--bg);transition:all .12s;user-select:none}
    .bi:hover{border-color:var(--blu)}
    .bi.on{border-color:var(--blu);background:var(--blu-lo)}
    .bi input{accent-color:var(--blu);width:12px;height:12px;pointer-events:none}
    .bilbl{font-size:12px}

    /* buttons */
    .btn{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-family:var(--ui);font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .btn:disabled{opacity:.5;pointer-events:none}
    .bprim{background:var(--acc);color:#000}.bprim:hover{background:#e69520}
    .bsec{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr)}.bsec:hover{border-color:var(--acc)}
    .bblu{background:var(--blu);color:#fff}.bblu:hover{background:#3a7de0}
    .bsm{padding:5px 10px;font-size:12px}
    .bfull{width:100%;justify-content:center}

    /* html output */
    .hout{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:12px;font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--mut);overflow:auto;white-space:pre-wrap;word-break:break-all;flex:1;min-height:0}
    .html-area{display:flex;flex-direction:column;height:calc(100vh - 120px);gap:10px}

    /* photos */
    .dz{border:2px dashed var(--bdr);border-radius:9px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
    .dz:hover,.dz.drag{border-color:var(--acc);background:var(--acc-lo)}
    .pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}
    .pthumb{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:1;background:var(--bg);border:1px solid var(--bdr)}
    .pthumb img{width:100%;height:100%;object-fit:cover;display:block}
    .pctrl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.78);padding:4px;display:flex;gap:3px;justify-content:center}
    .pidx{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;font-family:var(--mono)}
    .done-badge{position:absolute;top:4px;right:4px;background:var(--grn);color:#000;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px}

    /* misc */
    .empty{text-align:center;padding:36px 16px;color:var(--mut)}
    .empty h3{color:var(--txt);font-size:13px;margin-bottom:5px}
    .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ok{color:var(--grn);font-size:12px}
    .aapp{font-size:11px;color:var(--mut);padding:6px 9px;background:var(--bg);border-radius:5px;border:1px solid var(--bdr);margin-bottom:7px}
    .rfbtn{background:none;border:1px solid var(--bdr);color:var(--mut);border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;transition:all .12s}
    .rfbtn:hover{border-color:var(--acc);color:var(--acc)}
    .frow{display:flex;gap:5px;margin-bottom:8px}
    .fopt{padding:5px 11px;border:1px solid var(--bdr);border-radius:5px;cursor:pointer;font-size:12px;color:var(--mut);transition:all .12s;background:var(--bg);user-select:none}
    .fopt.on{border-color:var(--acc);background:var(--acc-lo);color:var(--acc);font-weight:600}
    .genbar{position:sticky;bottom:0;padding:12px 16px;background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;justify-content:flex-end;gap:8px;align-items:center;margin:0 -16px}
    .note{font-size:11px;color:var(--mut);margin-top:6px;text-align:center}
  </style>
</head>

function buildOpSection(op, type, productType) {
  const isLens = type==='lens';
  const label = isLens?'Lens':'Finder';
  const summary = isLens?'No problem in the shooting.':'No problem in the view.';
  const showBalsam = isLens && productType==='Lens';

  // Determine overall text
  let overallTxt = null;
  if(op.overall==='auto') {
    const hasIssue = op.fungus==='present'||op.haze==='present'||op.scratch==='present'||(showBalsam&&op.balsam==='present');
    const hasDust = op.dust==='present';
    if(!hasIssue&&!hasDust) overallTxt='Very beautiful condition.';
    else if(!hasIssue&&hasDust) overallTxt='Beautiful condition.';
  } else {
    overallTxt = OVERALL_TEXT[op.overall] ?? null;
  }

  const line = (val,noTxt,yesDef,note) =>
    (val==='none' ? noTxt : (note.trim()||yesDef)) + '<br>\n';

  let h = `<div>-${label} </div>\n`;
  if(overallTxt) h += `<div><b style="color:rgb(255,0,16);">${overallTxt}</b></div>\n`;
  h += line(op.fungus,'There is no fungus.','There is fungus.',op.fungusNote);
  h += line(op.haze,'There is no haze.','There is haze.',op.hazeNote);
  h += line(op.scratch,'There is no scratch.','There is a scratch.',op.scratchNote);
  h += line(op.dust,'There is no dust.','There is a little dust.',op.dustNote);
  if(showBalsam) h += line(op.balsam,'There is no balsam separation.','There is balsam separation.',op.balsamNote);
  h += `<strong>${summary}</strong>`;
  return h;
}

function rmBlack(img) {
  const c=document.createElement('canvas'); c.width=img.width; c.height=img.height;
  const ctx=c.getContext('2d'); ctx.drawImage(img,0,0);
  const d=ctx.getImageData(0,0,c.width,c.height);
  for(let i=0;i<d.data.length;i+=4) { if(d.data[i]<50&&d.data[i+1]<50&&d.data[i+2]<50) d.data[i+3]=0; }
  ctx.putImageData(d,0,0); return c;
}

      const draw=(b64,x,y,w,h,rb)=>new Promise(r=>{
        const si=new Image();
        si.onload=()=>{ ctx.drawImage(rb?rmBlack(si):si,x,y,w,h); r(); };
        si.src=`data:image/png;base64,${b64}`;
      });
      const W=img.width,H=img.height;
      const tasks=[];
      if(showVid) tasks.push(draw(VID_B64,W*.03,H*.04,W*.17,W*.17*.75,false));
      if(showDDP) tasks.push(draw(DDP_B64,W*.03,H*.20,W*.30,W*.30,true));
      Promise.all(tasks).then(()=>res(c.toDataURL('image/jpeg',.92)));
    };
    img.src=src;
  });
}

// ── AI Refine ──
async function refineNotes(lensOp,finOp,pType,funcCus) {
  const notes=[];
  ['fungus','haze','scratch','dust','balsam'].forEach(k=>{
    if(lensOp[k+'Note']?.trim()) notes.push(`Lens ${k}: "${lensOp[k+'Note']}"`);
    if(HAS_FINDER.has(pType)&&finOp[k+'Note']?.trim()) notes.push(`Finder ${k}: "${finOp[k+'Note']}"`);
  });
  if(funcCus.trim()) notes.push(`Functional: "${funcCus}"`);
  if(!notes.length) return null;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:800,
      system:`eBay listing writer for Japanese camera seller. Rewrite each note as short, natural professional English.
Style: "There is slight haze near the edge." / "Shutter works but self-timer is not functioning."
Return ONLY valid JSON: {"lensNotes":{"fungus":"","haze":"","scratch":"","dust":"","balsam":""},"finderNotes":{"fungus":"","haze":"","scratch":"","dust":""},"functionalNote":""}`,
      messages:[{role:'user',content:notes.join('\n')}]
    })
  });
  const data=await res.json();
  try{ return JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim()); }catch{ return null; }
}

// ── OpBox ──
function OpBox({title,op,setOp,showBalsam}) {
  const items=[...OP_ITEMS,...(showBalsam?['Balsam']:[])];
  const set=(f,v)=>setOp(p=>({...p,[f]:v}));
  return (
    <div className="opbox">
      <div className="opbtl">— {title}</div>
      <div className="overall-row">
        {OVERALL_OPTS.map(o=>(
          <button key={o.val} className={`ovbtn ${op.overall===o.val?'on':''}`} onClick={()=>set('overall',o.val)}>{o.lbl}</button>
        ))}
      </div>
      {items.map(item=>{
        const k=item.toLowerCase();
        return (
          <div key={item} className="oprow">
            <div className="oplbl">{item}</div>
            <div className="tg">
              <button className={`tgbtn nn ${op[k]==='none'?'on':''}`} onClick={()=>set(k,'none')}>なし</button>
              <button className={`tgbtn pp ${op[k]==='present'?'on':''}`} onClick={()=>set(k,'present')}>あり</button>
            </div>
            <input type="text" className="opni"
              placeholder={op[k]==='present'?'補足（任意）':''}
              value={op[k+'Note']||''}
              disabled={op[k]==='none'}
              style={{opacity:op[k]==='present'?1:0.3}}
              onChange={e=>set(k+'Note',e.target.value)}
            />
          </div>
        );
      })}
    </div>
  );
}

// ── App ──
function App() {
  const [items,setItems]=useState([]);
  const [sel,setSel]=useState(null);
  const [rtab,setRtab]=useState('html');

  const [pType,setPType]=useState('Film Camera');
  const [cond,setCond]=useState('Near MINT');
  const [serial,setSerial]=useState('');
  const [appOvr,setAppOvr]=useState('');
  const [lensOp,setLensOp]=useState(initOp());
  const [finOp,setFinOp]=useState(initOp());
  const [funcDef,setFuncDef]=useState(true);
  const [funcCus,setFuncCus]=useState('');
  const [bundles,setBundles]=useState([]);
  const [ebayTitle,setEbayTitle]=useState('');

  const [html,setHtml]=useState('');
  const [genBusy,setGenBusy]=useState(false);
  const [copied,setCopied]=useState(false);

  const [photos,setPhotos]=useState([]);
  const [procBusy,setProcBusy]=useState(false);
  const fileRef=useRef();

  const [ebayUrl,setEbayUrl]=useState('');
  const [saveOK,setSaveOK]=useState(false);

  const load=useCallback(()=>{
    try{ const r=localStorage.getItem('ebay_v2_items'); if(r) setItems(JSON.parse(r)); }catch{}
  },[]);
  useEffect(()=>{load();},[load]);

  const unsold=items.filter(i=>i.status==='unsold'&&!i.bundleGroupId);

  const handleSel=item=>{
    setSel(item); setEbayTitle(item.ebayTitle||''); setEbayUrl(item.ebayUrl||'');
    setSerial(''); setHtml(''); setPhotos([]); setSaveOK(false);
  };

  const toggleBundle=n=>setBundles(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
  const autoApp=getAutoApp(cond);

  const handleGenerate=async()=>{
    setGenBusy(true); setRtab('html');
    try{
      let lo={...lensOp},fo={...finOp},fc=funcCus;
      const hasNotes=[...Object.entries(lensOp),...Object.entries(finOp)].some(([k,v])=>k.endsWith('Note')&&v.trim())||(!funcDef&&funcCus.trim());
      if(hasNotes){
        const r=await refineNotes(lensOp,finOp,pType,funcCus);
        if(r){
          if(r.lensNotes) Object.entries(r.lensNotes).forEach(([k,v])=>{if(v) lo[k+'Note']=v;});
          if(r.finderNotes) Object.entries(r.finderNotes).forEach(([k,v])=>{if(v) fo[k+'Note']=v;});
          if(r.functionalNote) fc=r.functionalNote;
        }
      }
      setHtml(genHTML({title:ebayTitle,pType,cond,serial,appOvr,lensOp:lo,finOp:fo,funcDef,funcCus:fc,bundles}));
    }finally{setGenBusy(false);}
  };

  const handleCopy=()=>{
    navigator.clipboard.writeText(html).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };

  const handleFiles=async files=>{
    const arr=[];
    for(const f of Array.from(files)){
      if(!f.type.startsWith('image/')) continue;
      const url=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});
      arr.push({url,processedUrl:null,stampOn:true,videoOn:false});
    }
    setPhotos(p=>[...p,...arr]);
  };

  const toggleStamp=i=>setPhotos(p=>p.map((x,j)=>j===i?{...x,stampOn:!x.stampOn,processedUrl:null}:x));
  const toggleVideo=i=>setPhotos(p=>p.map((x,j)=>j===i?{...x,videoOn:!x.videoOn,processedUrl:null}:x));
  const removePhoto=i=>setPhotos(p=>p.filter((_,j)=>j!==i));

  const processPhotos=async()=>{
    setProcBusy(true);
    try{
      const done=await Promise.all(photos.map(async p=>{
        if(!p.stampOn&&!p.videoOn) return p;
        return {...p,processedUrl:await applyStamps(p.url,p.stampOn,p.videoOn)};
      }));
      setPhotos(done);
    }finally{setProcBusy(false);}
  };

  const dlPhoto=i=>{
    const p=photos[i]; const u=p.processedUrl||p.url;
    const a=document.createElement('a'); a.href=u; a.download=`photo_${i+1}.jpg`; a.click();
  };

  const saveToCalc=()=>{
    if(!sel||!ebayUrl) return;
    try{
      const raw=localStorage.getItem('ebay_v2_items'); if(!raw) return;
      const upd=JSON.parse(raw).map(i=>i.id===sel.id?{...i,ebayUrl,ebayTitle:ebayTitle||i.ebayTitle,status:'listed'}:i);
      localStorage.setItem('ebay_v2_items',JSON.stringify(upd));
      setSaveOK(true); load();
    }catch{}
  };

  const hasFinder=HAS_FINDER.has(pType);
  const hasBalsam=pType==='Lens';
  const bOpts=getBundles(pType);

  return (
    <div id="root">
      {/* ── Sidebar ── */}
      <div className="sidebar">
        <div className="sh">
          <span className="st">未出品</span>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span className="cnt">{unsold.length}</span>
            <button className="rfbtn" onClick={load}>↺</button>
          </div>
        </div>
        <div className="ilist">
          {unsold.length===0
            ?<div className="empty"><div style={{fontSize:26,marginBottom:6}}>📦</div><h3>未出品なし</h3></div>
            :unsold.map(i=>(
              <div key={i.id} className={`icard ${sel?.id===i.id?'sel':''}`} onClick={()=>handleSel(i)}>
                <div className="ino">#{i.managementNumber}</div>
                <div className="inm">{i.productName||'商品名未設定'}</div>
                <div className="icost">¥{(i.cost||0).toLocaleString()}</div>
              </div>
            ))
          }
        </div>
      </div>

      {/* ── Form panel ── */}
      <div className="fpanel">
        <div className="fpanel-header">
          {sel
            ?<><span style={{fontSize:14}}>📦</span><span className="fhtxt">#{sel.managementNumber} {sel.productName}</span><span style={{color:'var(--mut)',fontSize:11,flexShrink:0}}>¥{(sel.cost||0).toLocaleString()}</span></>
            :<span style={{color:'var(--mut)',fontSize:12}}>← 商品を選択してください</span>
          }
        </div>
        <div className="fcontent">

          <div className="sec">
            <div className="sttl">商品タイプ</div>
            <div className="tgrid">
              {TYPES.map(t=><div key={t} className={`tbtn ${pType===t?'on':''}`} onClick={()=>{setPType(t);setBundles([]);}}>{t}</div>)}
            </div>
          </div>

          <div className="sec">
            <div className="sttl">コンディション</div>
            <div className="cwrap">
              {CONDITIONS.map(c=><div key={c} className={`cbtn ${cond===c?'on':''}`} onClick={()=>setCond(c)}>{c}</div>)}
            </div>
          </div>

          <div className="sec">
            <div className="sttl">基本情報</div>
            <label>eBay タイトル</label>
            <input type="text" value={ebayTitle} onChange={e=>setEbayTitle(e.target.value)} placeholder="[Near MINT] Canon AE-1 35mm SLR Film Camera From JAPAN" />
            <label>シリアルナンバー</label>
            <input type="text" value={serial} onChange={e=>setSerial(e.target.value)} placeholder="Body: 1234567" />
          </div>

          <div className="sec">
            <div className="sttl">Appearance</div>
            <div className="aapp">自動 → {cond.startsWith('AS-IS')?'（手入力）':(autoApp.hl||autoApp.dl||'—')}</div>
            <label>カスタム（空欄で自動）</label>
            <input type="text" value={appOvr} onChange={e=>setAppOvr(e.target.value)} placeholder="例: Some scratches and scuffs from use." />
          </div>

          <div className="sec">
            <div className="sttl">Optics</div>
            <OpBox title="Lens" op={lensOp} setOp={setLensOp} showBalsam={hasBalsam} />
            {hasFinder&&<OpBox title="Finder" op={finOp} setOp={setFinOp} showBalsam={false} />}
          </div>

          <div className="sec">
            <div className="sttl">Functional</div>
            <div className="frow">
              <div className={`fopt ${funcDef?'on':''}`} onClick={()=>setFuncDef(true)}>✓ It works properly.</div>
              <div className={`fopt ${!funcDef?'on':''}`} onClick={()=>setFuncDef(false)}>✎ カスタム</div>
            </div>
            {!funcDef&&<textarea value={funcCus} onChange={e=>setFuncCus(e.target.value)} placeholder="例: Shutter works but the self-timer is not functioning." />}
          </div>

          <div className="sec">
            <div className="sttl">付属品</div>
            <div className="bgrid">
              {bOpts.map(n=>(
                <div key={n} className={`bi ${bundles.includes(n)?'on':''}`} onClick={()=>toggleBundle(n)}>
                  <input type="checkbox" readOnly checked={bundles.includes(n)} />
                  <span className="bilbl">{n}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="genbar">
            {genBusy&&<span style={{display:'flex',alignItems:'center',gap:5,color:'var(--mut)',fontSize:12}}><span className="spin"></span>AI処理中...</span>}
            <button className="btn bprim" onClick={handleGenerate} disabled={genBusy}>🤖 HTML生成</button>
          </div>
        </div>
      </div>

      {/* ── Right panel ── */}
      <div className="rpanel">
        <div className="rtabs">
          {[['html','💻 HTML'],['photos','📷 写真加工'],['publish','✅ 出品完了']].map(([id,lbl])=>(
            <div key={id} className={`rtab ${rtab===id?'on':''}`} onClick={()=>setRtab(id)}>{lbl}</div>
          ))}
        </div>
        <div className="rcontent">

          {rtab==='html'&&(
            <div className="html-area">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                <span style={{fontSize:11,color:'var(--mut)'}}>eBayの説明欄（HTMLモード）に貼り付け</span>
                <div style={{display:'flex',gap:7,alignItems:'center'}}>
                  {copied&&<span className="ok">✓ コピー完了</span>}
                  <button className="btn bblu bsm" onClick={handleCopy} disabled={!html}>📋 コピー</button>
                </div>
              </div>
              {html
                ?<div className="hout">{html}</div>
                :<div className="empty" style={{flex:1}}><div style={{fontSize:28,marginBottom:8}}>💻</div><h3>HTMLが未生成</h3><p style={{fontSize:11,marginTop:4}}>左のフォームを入力して<br/>「HTML生成」を押してください</p></div>
              }
            </div>
          )}

          {rtab==='photos'&&(
            <div>
              <div className="dz" onClick={()=>fileRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFiles(e.dataTransfer.files);}}>
                <div style={{fontSize:24}}>📸</div>
                <div style={{marginTop:6,fontSize:12,color:'var(--mut)'}}>ドロップ or クリック</div>
              </div>
              <input ref={fileRef} type="file" multiple accept="image/*" style={{display:'none'}} onChange={e=>handleFiles(e.target.files)} />
              {photos.length>0&&<>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'10px 0 6px'}}>
                  <span style={{fontSize:10,color:'var(--mut)'}}>🎯=DDP　▶=動画</span>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn bsec bsm" onClick={()=>photos.forEach((_,i)=>dlPhoto(i))}>⬇ 全DL</button>
                    <button className="btn bprim bsm" onClick={processPhotos} disabled={procBusy}>
                      {procBusy?<><span className="spin"></span>処理中</>:'✨ 合成'}
                    </button>
                  </div>
                </div>
                <div className="pgrid">
                  {photos.map((p,i)=>(
                    <div key={i} className="pthumb">
                      <img src={p.processedUrl||p.url} alt="" />
                      <div className="pidx">{i+1}</div>
                      {p.processedUrl&&<div className="done-badge">済</div>}
                      <div className="pctrl">
                        <button className="tgbtn" style={{fontSize:10,padding:'2px 5px',background:p.stampOn?'rgba(245,166,35,.35)':''}} onClick={()=>toggleStamp(i)}>🎯</button>
                        <button className="tgbtn" style={{fontSize:10,padding:'2px 5px',background:p.videoOn?'rgba(79,142,247,.35)':''}} onClick={()=>toggleVideo(i)}>▶</button>
                        <button className="tgbtn" style={{fontSize:10,padding:'2px 5px'}} onClick={()=>dlPhoto(i)}>↓</button>
                        <button className="tgbtn" style={{fontSize:10,padding:'2px 5px'}} onClick={()=>removePhoto(i)}>✕</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>}
            </div>
          )}

          {rtab==='publish'&&(
            <div>
              <div className="sec">
                <div className="sttl">出品後に保存</div>
                <label>eBay タイトル</label>
                <input type="text" value={ebayTitle} onChange={e=>setEbayTitle(e.target.value)} placeholder="[Near MINT] Canon AE-1 From JAPAN" />
                <label>eBay URL</label>
                <input type="text" value={ebayUrl} onChange={e=>{setEbayUrl(e.target.value);setSaveOK(false);}} placeholder="https://www.ebay.com/itm/..." />
                <div style={{marginTop:14}}>
                  {saveOK&&<div className="ok" style={{marginBottom:8,fontSize:12}}>✓ 利益計算シートに保存しました</div>}
                  <button className="btn bprim bfull" onClick={saveToCalc} disabled={!sel||!ebayUrl}>💾 利益計算シートに反映</button>
                  <div className="note">ステータスが「出品中」に更新されます</div>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
